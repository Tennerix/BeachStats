<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Tennis – Stats de Base</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080f1e;
  --surface:#0d1829;
  --card:#111e35;
  --border:#1e3560;
  --gold:#f5c518;
  --blue:#3b82f6;
  --orange:#f97316;
  --green:#22c55e;
  --red:#ef4444;
  --text:#e2eaf8;
  --muted:#4a6494;
}

body{
  font-family:Barlow,sans-serif;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 1rem 4rem;
}

/* Header & Timer */
.header{
  width:100%;
  max-width:580px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.2rem 0 1rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.4rem;
}
.header-logo{
  font-family:Barlow Condensed,sans-serif;
  font-size:22px;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold);
}

.timer-container{
  background:var(--surface);
  padding:8px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}
.timer-display{
  font-family:monospace;
  font-size:18px;
  font-weight:700;
  color:var(--text);
}
.timer-btn{
  background:none;
  border:none;
  color:var(--gold);
  font-weight:700;
  cursor:pointer;
  font-size:12px;
  text-transform:uppercase;
}

/* Stats Card */
.stats-card{
  width:100%;
  max-width:580px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:1.5rem;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--surface);
  color: var(--muted);
  font-family: Barlow Condensed, sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px;
}

td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}

.player-name {
  text-align: left;
  font-family: Barlow Condensed, sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: 14px;
}

.team-a .player-name { color: var(--blue); border-left: 4px solid var(--blue); padding-left: 10px; }
.team-b .player-name { color: var(--orange); border-left: 4px solid var(--orange); padding-left: 10px; }

.stat-control {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-add {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-weight: bold;
  cursor: pointer;
}
.btn-add:active { background: var(--gold); color: var(--bg); }

.counter {
  font-family: Barlow Condensed, sans-serif;
  font-size: 20px;
  font-weight: 900;
  min-width: 25px;
}

/* Log / Historique */
.log-container {
  width: 100%;
  max-width: 580px;
  background: var(--surface);
  border-radius: 12px;
  padding: 15px;
  height: 120px;
  overflow-y: auto;
  font-size: 12px;
  border: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
.log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
.log-time { color: var(--muted); margin-right: 8px; }

/* Actions */
.actions {
  width:100%;
  max-width:580px;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
.btn-action {
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  font-family:Barlow Condensed,sans-serif;
  font-weight:700;
  text-transform:uppercase;
  cursor:pointer;
}
.btn-action.pdf { background: var(--green); color: white; border: none; }
.btn-action.reset { color: var(--red); }

</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Stats<span>/</span>Base</div>
  <div class="timer-container">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <button class="timer-btn" id="timerBtn" onclick="toggleTimer()">▶ Start</button>
  </div>
</div>

<div class="stats-card">
  <table>
    <thead>
      <tr>
        <th style="text-align:left; padding-left:15px;">Entité</th>
        <th>Winner</th>
        <th>Fautes</th>
      </tr>
    </thead>
    <tbody id="statsTableBody">
      </tbody>
  </table>
</div>

<div class="log-container" id="log">
  <div class="log-entry"><span class="log-time">--:--</span> Initialisation du match...</div>
</div>

<div class="actions">
  <button class="btn-action reset" onclick="resetStats()">Réinitialiser</button>
  <button class="btn-action pdf" onclick="exportPDF()">Télécharger PDF</button>
</div>

<script>
// --- CONFIG & URL PARAMS ---
const params = new URLSearchParams(window.location.search);
const pNames = {
  j1: params.get('j1') || 'Joueur 1',
  j2: params.get('j2') || 'Joueur 2',
  j3: params.get('j3') || 'Joueur 3',
  j4: params.get('j4') || 'Joueur 4'
};
const mode = params.get('mode'); // 'joueur' ou 'equipe'

let statsData = {};
let timerSeconds = 0;
let timerInterval = null;

// --- INITIALISATION ---
function init() {
  const tbody = document.getElementById('statsTableBody');
  tbody.innerHTML = '';
  
  const config = (mode === 'joueur') 
    ? [
        { id: 'j1', name: pNames.j1, class: 'team-a' },
        { id: 'j2', name: pNames.j2, class: 'team-a' },
        { id: 'j3', name: pNames.j3, class: 'team-b' },
        { id: 'j4', name: pNames.j4, class: 'team-b' }
      ]
    : [
        { id: 'tA', name: 'Équipe A', class: 'team-a' },
        { id: 'tB', name: 'Équipe B', class: 'team-b' }
      ];

  config.forEach(item => {
    statsData[item.id] = { winner: 0, error: 0, name: item.name };
    tbody.innerHTML += `
      <tr class="${item.class}">
        <td class="player-name">${item.name}</td>
        <td>
          <div class="stat-control">
            <button class="btn-add" onclick="addPoint('${item.id}', 'winner')">+</button>
            <span class="counter" id="${item.id}-winner">0</span>
          </div>
        </td>
        <td>
          <div class="stat-control">
            <button class="btn-add" onclick="addPoint('${item.id}', 'error')">+</button>
            <span class="counter" id="${item.id}-error">0</span>
          </div>
        </td>
      </tr>
    `;
  });
  logMsg("Match configuré en mode " + (mode==='joueur'?'Individuel':'Équipe'));
}

// --- LOGIQUE STATS ---
function addPoint(id, type) {
  statsData[id][type]++;
  document.getElementById(`${id}-${type}`).textContent = statsData[id][type];
  logMsg(`${statsData[id].name} : +1 ${type === 'winner' ? 'Coup Gagnant' : 'Faute'}`);
}

function logMsg(msg) {
  const log = document.getElementById('log');
  const time = document.getElementById('timerDisplay').textContent;
  log.innerHTML = `<div class="log-entry"><span class="log-time">${time}</span> ${msg}</div>` + log.innerHTML;
}

function resetStats() {
  if(confirm("Effacer toutes les données ?")) {
    location.reload();
  }
}

// --- TIMER ---
function toggleTimer() {
  const btn = document.getElementById('timerBtn');
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
    btn.textContent = "▶ Start";
  } else {
    btn.textContent = "⏸ Pause";
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds / 60)).padStart(2,'0');
      const s = String(timerSeconds % 60).padStart(2,'0');
      document.getElementById('timerDisplay').textContent = `${m}:${s}`;
    }, 1000);
  }
}

// --- EXPORT PDF ---
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  
  doc.setFontSize(22);
  doc.setTextColor(20, 40, 80);
  doc.text("RAPPORT DE MATCH BEACH TENNIS", 20, 20);
  
  doc.setFontSize(12);
  doc.setTextColor(100);
  doc.text(`Durée du match : ${document.getElementById('timerDisplay').textContent}`, 20, 30);
  doc.text(`Mode : ${mode === 'joueur' ? 'Par Joueur' : 'Par Équipe'}`, 20, 37);

  doc.setLineWidth(0.5);
  doc.line(20, 42, 190, 42);

  let y = 55;
  Object.keys(statsData).forEach(id => {
    const data = statsData[id];
    doc.setFontSize(14);
    doc.setTextColor(0);
    doc.text(data.name.toUpperCase(), 20, y);
    doc.setFontSize(12);
    doc.text(`Coups gagnants : ${data.winner}`, 30, y + 8);
    doc.text(`Fautes directes : ${data.error}`, 30, y + 16);
    y += 30;
  });

  doc.save(`Stats_BeachTennis_${new Date().toLocaleDateString()}.pdf`);
}

init();
</script>
</body>
</html>
