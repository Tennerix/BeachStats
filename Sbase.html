<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Tennis – Stats Individuelles</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080f1e;
  --surface:#0d1829;
  --card:#111e35;
  --border:#1e3560;
  --gold:#f5c518;
  --blue:#3b82f6;
  --orange:#f97316;
  --green:#22c55e;
  --red:#ef4444;
  --purple:#a855f7;
  --text:#e2eaf8;
  --muted:#4a6494;
}

body{
  font-family:Barlow,sans-serif;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 1rem 4rem;
}

/* ── HEADER ── */
.header{
  width:100%;max-width:580px;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 0 1rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.2rem;
}
.header-logo{font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.header-logo span{color:var(--text);opacity:.5}
.header-back{background:none;border:1px solid var(--border);color:var(--muted);font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .18s}
.header-back:hover{border-color:var(--gold);color:var(--gold)}

/* ── STATUS BAR ── */
.status-bar{
  width:100%;max-width:580px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:.75rem 1.4rem;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:1rem;
}
.status-pill{font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--bg);background:var(--gold);padding:4px 14px;border-radius:20px}
.status-label{font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}

/* ── SCOREBOARD ── */
.scoreboard{
  width:100%;max-width:580px;
  background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;
  box-shadow:0 8px 48px rgba(0,0,0,.5);margin-bottom:1rem;
}
.score-header{
  display:grid;grid-template-columns:1fr 44px 44px 44px 80px;
  padding:.6rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border);
}
.score-header span{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center}
.score-header span:first-child{text-align:left}
.team-row{
  display:grid;grid-template-columns:1fr 44px 44px 44px 80px;align-items:center;
  padding:1rem 1.4rem;border-bottom:1px solid var(--border);transition:background .15s;
}
.team-row:last-child{border-bottom:none}
.team-info{display:flex;flex-direction:column;gap:3px}
.team-name{font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.team-players{font-size:11px;color:var(--muted);font-weight:500}
.team-row.team-a .team-name{color:var(--blue)}
.team-row.team-b .team-name{color:var(--orange)}
.cell{text-align:center;font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900}
.cell.set-score{font-family:Barlow Condensed,sans-serif;font-size:18px;font-weight:900;text-align:center;color:var(--muted);}
.cell.set-score.active{color:var(--text)}
.cell.set-score.won{color:var(--gold)}
.cell.point-cell{font-size:36px;color:var(--gold);font-style:italic}

/* ── STATS CARD (MODIFIÉE) ── */
.stats-card{
  width:100%;max-width:580px;
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:1.2rem 1.4rem;margin-bottom:1rem;
}
.stats-title{
  font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  margin-bottom:1rem;display:flex;align-items:center;gap:8px;
}
.stats-title::after{content:'';flex:1;height:1px;background:var(--border)}

.stat-group-title{
  font-family:Barlow Condensed,sans-serif; font-size:10px; color:var(--gold); 
  text-align:center; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px;
}
.stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:.5rem}
.stat-val{font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900;}
.stat-val.a{color:var(--blue);text-align:right}
.stat-val.b{color:var(--orange);text-align:left}
.stat-name{
  font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;
  min-width:80px;
}

/* ── ACTIONS ── */
.team-controls{width:100%;max-width:580px;margin-bottom:.8rem}
.team-ctrl-label{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;padding-left:4px;}
.team-ctrl-label.a{color:var(--blue)}
.team-ctrl-label.b{color:var(--orange)}
.ctrl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.btn-winner,.btn-faute{
  padding:.9rem .8rem;border-radius:14px;border:2px solid;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1;
  font-family:Barlow Condensed,sans-serif;
}
.btn-winner.a{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.btn-winner.b{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.btn-faute.a{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}
.btn-faute.b{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}
.btn-main{font-size:14px;font-weight:900;text-transform:uppercase}
.btn-sub{font-size:9px;opacity:.7;text-transform:uppercase}

.actions{width:100%;max-width:580px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.btn-action{
  padding:.75rem;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);
  font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}

/* ── LOG & TIMER ── */
.timer-wrap{width:100%;max-width:580px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:.9rem 1.4rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.timer-display{font-family:Barlow Condensed,sans-serif;font-size:38px;font-weight:900;letter-spacing:4px;color:var(--gold);min-width:110px;}
.log-wrap{width:100%;max-width:580px}
.log-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.45rem 1rem;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;}

/* ── WINNER OVERLAY ── */
.winner-overlay{display:none;position:fixed;inset:0;background:rgba(8,15,30,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;padding:2rem;}
.winner-overlay.show{display:flex}
.winner-box{background:var(--card);border:2px solid var(--gold);border-radius:24px;padding:2.5rem 2rem;text-align:center;max-width:400px;width:100%;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Beach<span>/</span>Stats</div>
  <button class="header-back" onclick="window.location.href='index.html'">← Accueil</button>
</div>

<div class="status-bar">
  <div class="status-pill" id="setPill">Set 1</div>
  <div class="status-label" id="statusLabel">En cours</div>
</div>

<div class="timer-wrap">
  <div class="timer-display" id="timerDisplay">00:00</div>
  <div class="timer-btns">
    <button class="timer-btn start" id="timerStartBtn" onclick="timerToggle()" style="padding:.5rem 1rem; border-radius:8px; cursor:pointer; background:var(--surface); color:var(--green); border:1px solid var(--green)">▶ Start</button>
  </div>
</div>

<div class="scoreboard">
  <div class="score-header">
    <span>Équipe</span><span>S1</span><span>S2</span><span>S3</span><span>Points</span>
  </div>
  <div class="team-row team-a" id="rowA">
    <div class="team-info">
      <div class="team-name">Équipe A</div>
      <div class="team-players" id="playersA">—</div>
    </div>
    <div class="cell set-score" id="setA1">—</div>
    <div class="cell set-score" id="setA2">—</div>
    <div class="cell set-score" id="setA3">—</div>
    <div class="cell point-cell" id="ptA">0</div>
  </div>
  <div class="team-row team-b" id="rowB">
    <div class="team-info">
      <div class="team-name">Équipe B</div>
      <div class="team-players" id="playersB">—</div>
    </div>
    <div class="cell set-score" id="setB1">—</div>
    <div class="cell set-score" id="setB2">—</div>
    <div class="cell set-score" id="setB3">—</div>
    <div class="cell point-cell" id="ptB">0</div>
  </div>
</div>

<div class="team-controls">
  <div class="team-ctrl-label a" id="lblJ1">Joueur 1</div>
  <div class="ctrl-row">
    <button class="btn-winner a" onclick="scorePoint(1, 1, 'winner')"><span class="btn-main">Winner</span></button>
    <button class="btn-faute a" onclick="scorePoint(2, 1, 'faute')"><span class="btn-main">Faute</span></button>
  </div>
</div>
<div class="team-controls" style="margin-bottom: 20px;">
  <div class="team-ctrl-label a" id="lblJ2">Joueur 2</div>
  <div class="ctrl-row">
    <button class="btn-winner a" onclick="scorePoint(1, 2, 'winner')"><span class="btn-main">Winner</span></button>
    <button class="btn-faute a" onclick="scorePoint(2, 2, 'faute')"><span class="btn-main">Faute</span></button>
  </div>
</div>

<div class="team-controls">
  <div class="team-ctrl-label b" id="lblJ3">Joueur 3</div>
  <div class="ctrl-row">
    <button class="btn-winner b" onclick="scorePoint(2, 3, 'winner')"><span class="btn-main">Winner</span></button>
    <button class="btn-faute b" onclick="scorePoint(1, 3, 'faute')"><span class="btn-main">Faute</span></button>
  </div>
</div>
<div class="team-controls">
  <div class="team-ctrl-label b" id="lblJ4">Joueur 4</div>
  <div class="ctrl-row">
    <button class="btn-winner b" onclick="scorePoint(2, 4, 'winner')"><span class="btn-main">Winner</span></button>
    <button class="btn-faute b" onclick="scorePoint(1, 4, 'faute')"><span class="btn-main">Faute</span></button>
  </div>
</div>

<div class="actions">
  <button class="btn-action undo" onclick="undo()" style="color:#f59e0b">↩ Annuler</button>
  <button class="btn-action pdf" onclick="exportPDF()" style="color:var(--green)">⬇ PDF</button>
  <button class="btn-action reset" onclick="resetMatch()" style="color:var(--red)">⟳ Reset</button>
</div>

<div class="stats-card">
  <div class="stats-title">Stats individuelles</div>
  
  <div class="stat-group-title">Coups gagnants</div>
  <div class="stat-row">
    <div class="stat-val a" id="st-wJ1">0</div>
    <div class="stat-name" id="sn-J1">J1</div>
    <div class="stat-val b" id="st-wJ3">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-val a" id="st-wJ2">0</div>
    <div class="stat-name" id="sn-J2">J2</div>
    <div class="stat-val b" id="st-wJ4">0</div>
  </div>

  <div class="stat-group-title" style="margin-top:15px">Fautes directes</div>
  <div class="stat-row">
    <div class="stat-val a" id="st-fJ1" style="color:var(--red)">0</div>
    <div class="stat-name" id="sn-fJ1">J1</div>
    <div class="stat-val b" id="st-fJ3" style="color:var(--red)">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-val a" id="st-fJ2" style="color:var(--red)">0</div>
    <div class="stat-name" id="sn-fJ2">J2</div>
    <div class="stat-val b" id="st-fJ4" style="color:var(--red)">0</div>
  </div>
</div>

<div class="log-wrap">
  <div class="log-list" id="logList"></div>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-box">
    <div class="winner-trophy">🏆</div>
    <div class="winner-name" id="winnerName">—</div>
    <div class="winner-score" id="winnerScore">—</div>
    <button class="winner-btn primary" onclick="resetMatch()" style="padding:10px; border-radius:8px; cursor:pointer; background:var(--gold); color:black; font-weight:bold; border:none">Nouveau match</button>
  </div>
</div>

<script>
const _p = new URLSearchParams(window.location.search);
const players = {
  j1: _p.get('j1') || 'Joueur 1', j2: _p.get('j2') || 'Joueur 2',
  j3: _p.get('j3') || 'Joueur 3', j4: _p.get('j4') || 'Joueur 4'
};
const nameA = players.j1 + ' / ' + players.j2;
const nameB = players.j3 + ' / ' + players.j4;

let p1=0, p2=0, g1=0, g2=0, s1=0, s2=0;
let setHistory=[], history=[], matchLog=[], matchOver=false;
let stats = { 
    wJ1:0, wJ2:0, wJ3:0, wJ4:0, 
    fJ1:0, fJ2:0, fJ3:0, fJ4:0,
    pA:0, pB:0 
};

const TP = ['0','15','30','40'];

function initNames() {
  document.getElementById('playersA').textContent = nameA;
  document.getElementById('playersB').textContent = nameB;
  document.getElementById('lblJ1').textContent = players.j1;
  document.getElementById('lblJ2').textContent = players.j2;
  document.getElementById('lblJ3').textContent = players.j3;
  document.getElementById('lblJ4').textContent = players.j4;
  
  // Noms dans le bloc stats
  document.getElementById('sn-J1').textContent = players.j1.split(' ')[0];
  document.getElementById('sn-J2').textContent = players.j2.split(' ')[0];
  document.getElementById('sn-J3').textContent = players.j3.split(' ')[0];
  document.getElementById('sn-J4').textContent = players.j4.split(' ')[0];
  document.getElementById('sn-fJ1').textContent = players.j1.split(' ')[0];
  document.getElementById('sn-fJ2').textContent = players.j2.split(' ')[0];
  document.getElementById('sn-fJ3').textContent = players.j3.split(' ')[0];
  document.getElementById('sn-fJ4').textContent = players.j4.split(' ')[0];
}

function scorePoint(teamWin, playerIdx, type) {
  if (matchOver) return;
  history.push({p1,p2,g1,g2,s1,s2,stats:{...stats},setHistory:[...setHistory]});

  if (teamWin === 1) stats.pA++; else stats.pB++;

  // Logique stats individuelles
  if (type === 'winner') {
      stats['wJ' + playerIdx]++;
  } else {
      stats['fJ' + playerIdx]++;
  }

  const pName = players['j'+playerIdx];
  logEvent(pName, (type==='winner'?'🎯 Winner':'💥 Faute'));

  // Logique Tennis No-Ad
  if (teamWin === 1) p1++; else p2++;
  if (p1 > 3 || p2 > 3) { winGame(teamWin); }
  updateDisplay();
}

function winGame(team) {
  p1=0; p2=0;
  if (team === 1) g1++; else g2++;
  if (g1 >= 6 && Math.abs(g1-g2) >= 2) winSet(team);
  else if (g1===6 && g2===6) winSet(team); // Simplifié pour l'exemple
}

function winSet(team) {
  setHistory.push({a:g1, b:g2});
  g1=0; g2=0;
  if (team === 1) s1++; else s2++;
  if (s1 === 2 || s2 === 2) winMatch(team);
}

function winMatch(team) {
  matchOver = true;
  document.getElementById('winnerName').textContent = team === 1 ? nameA : nameB;
  document.getElementById('winnerOverlay').classList.add('show');
}

function updateDisplay() {
  document.getElementById('ptA').textContent = TP[p1] || '0';
  document.getElementById('ptB').textContent = TP[p2] || '0';
  
  // Update scores sets (Simplifié)
  document.getElementById('setA1').textContent = g1;
  document.getElementById('setB1').textContent = g2;

  // UPDATE LIVE STATS INDIVIDUELLES
  document.getElementById('st-wJ1').textContent = stats.wJ1;
  document.getElementById('st-wJ2').textContent = stats.wJ2;
  document.getElementById('st-wJ3').textContent = stats.wJ3;
  document.getElementById('st-wJ4').textContent = stats.wJ4;
  document.getElementById('st-fJ1').textContent = stats.fJ1;
  document.getElementById('st-fJ2').textContent = stats.fJ2;
  document.getElementById('st-fJ3').textContent = stats.fJ3;
  document.getElementById('st-fJ4').textContent = stats.fJ4;
}

function logEvent(name, msg) {
  const list = document.getElementById('logList');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span><strong>${name}</strong> : ${msg}</span>`;
  list.prepend(div);
}

function undo() {
  if (history.length === 0) return;
  const last = history.pop();
  p1=last.p1; p2=last.p2; g1=last.g1; g2=last.g2; s1=last.s1; s2=last.s2;
  stats={...last.stats}; setHistory=last.setHistory;
  updateDisplay();
}

function resetMatch() { location.reload(); }

let timerSeconds = 0, timerInterval, timerRunning = false;
function timerToggle() {
  if (timerRunning) { clearInterval(timerInterval); timerRunning=false; }
  else {
    timerRunning=true;
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
      const s = String(timerSeconds%60).padStart(2,'0');
      document.getElementById('timerDisplay').textContent = m + ':' + s;
    }, 1000);
  }
}

initNames();
updateDisplay();
</script>
</body>
</html>
