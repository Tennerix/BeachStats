<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Score Tennis - 4 Joueurs</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .scoreboard {
            background: #333; color: #fff; padding: 20px;
            border-radius: 10px; display: inline-block;
            margin-top: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .score-row {
            font-size: 20px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .points { font-weight: bold; color: #00ff00; font-size: 28px; min-width: 50px; }
        button {
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            margin: 2px;
            border-radius: 5px;
            border: none;
        }
        .btn-win { background-color: #007BFF; color: white; }
        .btn-fault { background-color: #dc3545; color: white; }
        .btn-reset { background-color: #ff4444; color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="scoreboard">
    <h2>Scoreboard - 4 Joueurs</h2>

    <div class="score-row">
        Joueur 1 : <span id="p1" class="points">0</span>
        <button class="btn-win" onclick="winPoint(1)">+ Point gagnant</button>
        <button class="btn-fault" onclick="fault(1)">Faute directe</button>
    </div>

    <div class="score-row">
        Joueur 2 : <span id="p2" class="points">0</span>
        <button class="btn-win" onclick="winPoint(2)">+ Point gagnant</button>
        <button class="btn-fault" onclick="fault(2)">Faute directe</button>
    </div>

    <div class="score-row">
        Joueur 3 : <span id="p3" class="points">0</span>
        <button class="btn-win" onclick="winPoint(3)">+ Point gagnant</button>
        <button class="btn-fault" onclick="fault(3)">Faute directe</button>
    </div>

    <div class="score-row">
        Joueur 4 : <span id="p4" class="points">0</span>
        <button class="btn-win" onclick="winPoint(4)">+ Point gagnant</button>
        <button class="btn-fault" onclick="fault(4)">Faute directe</button>
    </div>

    <button class="btn-reset" onclick="reset()">Remise à zéro</button>
</div>

<script>
    let points = [0, 0, 0, 0]; // 4 joueurs
    let history = [];

    function saveState() {
        history.push([...points]);
    }

    function winPoint(player) {
        saveState();
        points[player - 1] += 1;
        updateDisplay();
    }

    function fault(player) {
        saveState();

        // la faute donne un point aux autres joueurs
        for (let i = 0; i < 4; i++) {
            if (i !== player - 1) points[i] += 1;
        }

        updateDisplay();
    }

    function updateDisplay() {
        document.getElementById('p1').innerText = points[0];
        document.getElementById('p2').innerText = points[1];
        document.getElementById('p3').innerText = points[2];
        document.getElementById('p4').innerText = points[3];
    }

    function reset() {
        if (confirm("Remise à zéro ?")) {
            points = [0, 0, 0, 0];
            history = [];
            updateDisplay();
        }
    }
</script>

</body>
</html>
