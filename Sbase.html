<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Beach Tennis - 2 vs 2</title>

<style>
    body { font-family: sans-serif; text-align: center; background: #f4f4f4; }

    .scoreboard {
        background: #333;
        color: white;
        padding: 20px;
        display: inline-block;
        border-radius: 10px;
        margin-top: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .team {
        margin: 15px 0;
        padding: 10px;
        border-bottom: 1px solid #555;
    }

    .points {
        font-size: 32px;
        color: #00ff00;
        font-weight: bold;
        margin-left: 10px;
    }

    button {
        margin: 3px;
        padding: 6px 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .win { background: #007BFF; color: white; }
    .fault { background: #dc3545; color: white; }

    .team-title {
        font-weight: bold;
        margin-bottom: 5px;
        font-size: 18px;
    }
</style>
</head>

<body>

<div class="scoreboard">
    <h2>Beach Tennis - 2 vs 2</h2>

    <div>
        Set: <span id="s1">0</span> - <span id="s2">0</span>
    </div>

    <hr>

    <!-- ÉQUIPE 1 -->
    <div class="team">
        <div class="team-title">Équipe 1 (J1 + J2)</div>

        Joueur 1
        <button class="win" onclick="winPoint(1)">Point gagnant</button>
        <button class="fault" onclick="fault(1)">Faute directe</button>

        <br>

        Joueur 2
        <button class="win" onclick="winPoint(2)">Point gagnant</button>
        <button class="fault" onclick="fault(2)">Faute directe</button>

        <div>Points équipe : <span id="p1" class="points">0</span></div>
    </div>

    <!-- ÉQUIPE 2 -->
    <div class="team">
        <div class="team-title">Équipe 2 (J3 + J4)</div>

        Joueur 3
        <button class="win" onclick="winPoint(3)">Point gagnant</button>
        <button class="fault" onclick="fault(3)">Faute directe</button>

        <br>

        Joueur 4
        <button class="win" onclick="winPoint(4)">Point gagnant</button>
        <button class="fault" onclick="fault(4)">Faute directe</button>

        <div>Points équipe : <span id="p2" class="points">0</span></div>
    </div>

    <br>
    <button onclick="reset()" style="background:red;color:white;">Reset</button>
</div>

<script>
let team1 = 0;
let team2 = 0;
let sets1 = 0;
let sets2 = 0;

const format = ["0","15","30","40"];

function winPoint(player) {
    if (player === 1 || player === 2) {
        team1++;
    } else {
        team2++;
    }
    checkGame();
    update();
}

function fault(player) {
    // faute = point pour équipe adverse
    if (player === 1 || player === 2) {
        team2++;
    } else {
        team1++;
    }
    checkGame();
    update();
}

function checkGame() {

    // jeu classique beach tennis (40 = 4 points simplifiés)
    if (team1 >= 4 && team1 - team2 >= 2) {
        sets1++;
        team1 = 0;
        team2 = 0;
    }

    if (team2 >= 4 && team2 - team1 >= 2) {
        sets2++;
        team1 = 0;
        team2 = 0;
    }
}

function update() {
    document.getElementById("p1").innerText = format[team1] || "40+";
    document.getElementById("p2").innerText = format[team2] || "40+";

    document.getElementById("s1").innerText = sets1;
    document.getElementById("s2").innerText = sets2;
}

function reset() {
    team1 = 0;
    team2 = 0;
    sets1 = 0;
    sets2 = 0;
    update();
}
</script>

</body>
</html>
