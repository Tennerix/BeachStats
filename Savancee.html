<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Tennis – Stats Avancées</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080f1e;
  --surface:#0d1829;
  --card:#111e35;
  --border:#1e3560;
  --gold:#f5c518;
  --blue:#3b82f6;
  --orange:#f97316;
  --green:#22c55e;
  --red:#ef4444;
  --purple:#a855f7;
  --text:#e2eaf8;
  --muted:#4a6494;
}

body{
  font-family:Barlow,sans-serif;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 1rem 4rem;
}

/* ── HEADER ── */
.header{
  width:100%;max-width:580px;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 0 1rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.2rem;
}
.header-logo{font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.header-logo span{color:var(--text);opacity:.5}
.header-back{background:none;border:1px solid var(--border);color:var(--muted);font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .18s}
.header-back:hover{border-color:var(--gold);color:var(--gold)}

/* ── STATUS BAR ── */
.status-bar{
  width:100%;max-width:580px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:.75rem 1.4rem;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:1rem;
}
.status-pill{font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--bg);background:var(--gold);padding:4px 14px;border-radius:20px}
.status-label{font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}

/* ── SCOREBOARD ── */
.scoreboard{
  width:100%;max-width:580px;
  background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;
  box-shadow:0 8px 48px rgba(0,0,0,.5);margin-bottom:1rem;
}
.score-header{
  display:grid;grid-template-columns:1fr 44px 44px 44px 80px;
  padding:.6rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border);
}
.score-header span{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center}
.score-header span:first-child{text-align:left}
.team-row{
  display:grid;grid-template-columns:1fr 44px 44px 44px 80px;align-items:center;
  padding:1rem 1.4rem;border-bottom:1px solid var(--border);transition:background .15s;
}
.team-row:last-child{border-bottom:none}
.team-info{display:flex;flex-direction:column;gap:3px}
.team-name{font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.team-players{font-size:11px;color:var(--muted);font-weight:500}
.team-row.team-a .team-name{color:var(--blue)}
.team-row.team-b .team-name{color:var(--orange)}
.cell{text-align:center;font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900}
.cell.sets-cell span{display:inline-block;width:28px;height:28px;line-height:28px;border-radius:50%;font-size:14px;font-weight:900}
.cell.sets-cell span.won{background:var(--gold);color:var(--bg)}
.cell.set-score{
  font-family:Barlow Condensed,sans-serif;font-size:18px;font-weight:900;
  text-align:center;color:var(--muted);
}
.cell.set-score.active{color:var(--text)}
.cell.set-score.won{color:var(--gold)}
.cell.point-cell{font-size:36px;color:var(--gold);font-style:italic}

/* ── STATS CARD ── */
.stats-card{
  width:100%;max-width:580px;
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:1.2rem 1.4rem;margin-bottom:1rem;
}
.stats-title{
  font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  margin-bottom:1rem;display:flex;align-items:center;gap:8px;
}
.stats-title::after{content:'';flex:1;height:1px;background:var(--border)}

.stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:.7rem}
.stat-row:last-child{margin-bottom:0}
.stat-val{
  font-family:Barlow Condensed,sans-serif;font-size:24px;font-weight:900;
}
.stat-val.a{color:var(--blue);text-align:right}
.stat-val.b{color:var(--orange);text-align:left}
.stat-name{
  font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;
  white-space:nowrap;
}
.stat-bar-wrap{grid-column:1/-1;display:flex;height:4px;border-radius:4px;overflow:hidden;background:var(--surface)}
.stat-bar-a{background:var(--blue);transition:width .4s}
.stat-bar-b{background:var(--orange);transition:width .4s}

/* ── ACTIONS ── */
.team-controls{width:100%;max-width:580px;margin-bottom:.8rem}
.team-ctrl-label{
  font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:6px;padding-left:4px;
}
.team-ctrl-label.a{color:var(--blue)}
.team-ctrl-label.b{color:var(--orange)}
.ctrl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-winner,.btn-faute{
  padding:.9rem .8rem;border-radius:14px;border:2px solid;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1;
  font-family:Barlow Condensed,sans-serif;
}
.btn-winner:active,.btn-faute:active{transform:scale(.96)}
.btn-icon{font-size:22px}
.btn-main{font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.btn-sub{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.6}
.btn-winner.a{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.btn-winner.a:hover{background:rgba(34,197,94,.22);transform:scale(1.02)}
.btn-winner.b{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.btn-winner.b:hover{background:rgba(34,197,94,.22);transform:scale(1.02)}
.btn-faute.a{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}
.btn-faute.a:hover{background:rgba(239,68,68,.2);transform:scale(1.02)}
.btn-faute.b{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}
.btn-faute.b:hover{background:rgba(239,68,68,.2);transform:scale(1.02)}

.actions{width:100%;max-width:580px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.btn-action{
  padding:.75rem;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);
  font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-action:hover{background:#162040;border-color:var(--muted)}
.btn-action.undo{border-color:#f59e0b;color:#f59e0b}
.btn-action.undo:hover{background:rgba(245,158,11,.12)}
.btn-action.reset{border-color:var(--red);color:var(--red)}
.btn-action.reset:hover{background:rgba(239,68,68,.12)}
.btn-action.pdf{border-color:var(--green);color:var(--green)}
.btn-action.pdf:hover{background:rgba(34,197,94,.12)}

/* ── LOG ── */
.log-wrap{width:100%;max-width:580px}
.log-title{font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;padding-left:4px}
.log-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.log-entry{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:.45rem 1rem;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;
}
.log-entry .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.log-entry.dot-a .dot{background:var(--blue)}
.log-entry.dot-b .dot{background:var(--orange)}
.log-entry.dot-w .dot{background:var(--green)}
.log-entry.dot-f .dot{background:var(--red)}
.log-entry.event .dot{background:var(--gold)}
.log-tag{
  margin-left:auto;font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px;
}
.log-tag.winner{background:rgba(34,197,94,.15);color:var(--green)}
.log-tag.faute{background:rgba(239,68,68,.15);color:var(--red)}

/* ── WINNER OVERLAY ── */
.winner-overlay{
  display:none;position:fixed;inset:0;background:rgba(8,15,30,.92);z-index:100;
  align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;padding:2rem;
}
.winner-overlay.show{display:flex}
.winner-box{
  background:var(--card);border:2px solid var(--gold);border-radius:24px;
  padding:2.5rem 2rem;text-align:center;max-width:400px;width:100%;
  box-shadow:0 0 80px rgba(245,197,24,.2);
}
.winner-trophy{font-size:60px;margin-bottom:1rem}
.winner-label{font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:.5rem}
.winner-name{font-family:Barlow Condensed,sans-serif;font-size:32px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:.4rem}
.winner-score{font-family:Barlow Condensed,sans-serif;font-size:16px;color:var(--muted);letter-spacing:1px;margin-bottom:1.2rem}
.winner-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.4rem}
.ws-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.8rem}
.ws-val{font-family:Barlow Condensed,sans-serif;font-size:28px;font-weight:900}
.ws-val.a{color:var(--blue)}
.ws-val.b{color:var(--orange)}
.ws-lbl{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.winner-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.winner-btn{padding:.7rem 1.4rem;border-radius:10px;border:1.5px solid;font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.winner-btn.primary{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.1)}
.winner-btn.primary:hover{background:rgba(245,197,24,.25)}
.winner-btn.secondary{border-color:var(--border);color:var(--muted);background:none}
.winner-btn.secondary:hover{border-color:var(--muted);color:var(--text)}

/* ── TIMER ── */
.timer-wrap{
  width:100%;max-width:580px;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:.9rem 1.4rem;margin-bottom:1rem;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.timer-display{
  font-family:Barlow Condensed,sans-serif;font-size:38px;font-weight:900;
  letter-spacing:4px;color:var(--gold);font-variant-numeric:tabular-nums;
  min-width:110px;
}
.timer-display.running{color:#fff}
.timer-btns{display:flex;gap:8px}
.timer-btn{
  padding:.5rem 1rem;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);
  font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;
}
.timer-btn:hover{background:#162040;border-color:var(--muted)}
.timer-btn.start{border-color:var(--green);color:var(--green)}
.timer-btn.start:hover{background:rgba(34,197,94,.12)}
.timer-btn.pause{border-color:var(--gold);color:var(--gold)}
.timer-btn.pause:hover{background:rgba(245,197,24,.12)}
.timer-btn.stop{border-color:var(--red);color:var(--red)}
.timer-btn.stop:hover{background:rgba(239,68,68,.12)}

/* ── SHOT MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(8,15,30,.88);z-index:50;align-items:flex-end;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:24px 24px 20px 20px;width:100%;max-width:520px;padding:1.4rem 1.2rem 1.8rem;box-shadow:0 -8px 48px rgba(0,0,0,.6)}
.modal-context{font-family:Barlow Condensed,sans-serif;font-size:17px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:1rem;color:var(--text)}
.modal-context span{display:block;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:4px}
.shot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.shot-btn{padding:.7rem .3rem;border-radius:12px;border:2px solid;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1.2;text-align:center}
.shot-btn:active{transform:scale(.95)}
.shot-btn .s-ico{font-size:20px}
.shot-btn.type-winner{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08)}
.shot-btn.type-winner:hover{background:rgba(34,197,94,.2)}
.shot-btn.type-faute{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08)}
.shot-btn.type-faute:hover{background:rgba(239,68,68,.2)}
.modal-cancel{width:100%;padding:.65rem;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.modal-cancel:hover{border-color:var(--muted);color:var(--text)}

/* ── ADVANCED STATS TABLE ── */
.stats-section{margin-bottom:.8rem}
.stats-section-title{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.stats-section-title.w{color:var(--green)}
.stats-section-title.f{color:var(--red)}
.stats-table{width:100%;border-collapse:collapse}
.stats-table tr{border-bottom:1px solid var(--border)}
.stats-table tr:last-child{border-bottom:none}
.stats-table td{padding:.35rem .2rem;font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;vertical-align:middle}
.stats-table .td-lbl{color:var(--muted);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center}
.stats-table .td-a{color:var(--blue);text-align:right;font-size:18px;width:36px}
.stats-table .td-b{color:var(--orange);text-align:left;font-size:18px;width:36px}
.stats-table .td-bar{padding:0 .4rem}
.mini-bar{height:5px;border-radius:4px;overflow:hidden;background:var(--surface);display:flex}
.mini-bar-a{background:var(--blue);transition:width .3s}
.mini-bar-b{background:var(--orange);transition:width .3s}
.stats-totals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:.6rem}
.tot-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem;text-align:center}
.tot-val{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:900;display:flex;justify-content:center;gap:8px}
.tot-val span.a{color:var(--blue)}
.tot-val span.b{color:var(--orange)}
.tot-lbl{font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}

@media(max-width:440px){
  .score-header,.team-row{grid-template-columns:1fr 36px 36px 36px 64px;padding:.8rem .7rem}
  .cell.set-score{
  font-family:Barlow Condensed,sans-serif;font-size:18px;font-weight:900;
  text-align:center;color:var(--muted);
}
.cell.set-score.active{color:var(--text)}
.cell.set-score.won{color:var(--gold)}
.cell.point-cell{font-size:28px}
  .shot-btn{font-size:14px;padding:.9rem .6rem}
  .shot-btn .shot-icon{font-size:24px}
  .actions{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Beach<span>/</span>Stats</div>
  <button class="header-back" onclick="window.location.href='index.html'">← Accueil</button>
</div>

<div class="status-bar">
  <div class="status-pill" id="setPill">Set 1</div>
  <div class="status-label" id="statusLabel">En cours</div>
</div>

<!-- Timer -->
<div class="timer-wrap">
  <div class="timer-display" id="timerDisplay">00:00</div>
  <div class="timer-btns">
    <button class="timer-btn start" id="timerStartBtn" onclick="timerToggle()">▶ Start</button>
  </div>
</div>

<!-- Scoreboard -->
<div class="scoreboard">
  <div class="score-header" id="scoreHeader">
    <span>Équipe</span>
    <span>S1</span>
    <span>S2</span>
    <span>S3</span>
    <span>Points</span>
  </div>
  <div class="team-row team-a" id="rowA">
    <div class="team-info">
      <div class="team-name" id="nameA">Équipe A</div>
      <div class="team-players" id="playersA">—</div>
    </div>
    <div class="cell set-score" id="setA1">—</div>
    <div class="cell set-score" id="setA2">—</div>
    <div class="cell set-score" id="setA3">—</div>
    <div class="cell point-cell" id="ptA">0</div>
  </div>
  <div class="team-row team-b" id="rowB">
    <div class="team-info">
      <div class="team-name" id="nameB">Équipe B</div>
      <div class="team-players" id="playersB">—</div>
    </div>
    <div class="cell set-score" id="setB1">—</div>
    <div class="cell set-score" id="setB2">—</div>
    <div class="cell set-score" id="setB3">—</div>
    <div class="cell point-cell" id="ptB">0</div>
  </div>
</div>

<!-- Point buttons -->
<div class="team-controls">
  <div class="team-ctrl-label a" id="lblA">Équipe A</div>
  <div class="ctrl-row">
    <button class="btn-winner a" onclick="openShotModal(1,'winner')">
      <span class="btn-icon">🎯</span>
      <span class="btn-main">Point gagnant</span>
      <span class="btn-sub">Choisir le coup</span>
    </button>
    <button class="btn-faute a" onclick="openShotModal(2,'faute')">
      <span class="btn-icon">💥</span>
      <span class="btn-main">Faute directe</span>
      <span class="btn-sub">Choisir le coup</span>
    </button>
  </div>
</div>

<div class="team-controls">
  <div class="team-ctrl-label b" id="lblB">Équipe B</div>
  <div class="ctrl-row">
    <button class="btn-winner b" onclick="openShotModal(2,'winner')">
      <span class="btn-icon">🎯</span>
      <span class="btn-main">Point gagnant</span>
      <span class="btn-sub">Choisir le coup</span>
    </button>
    <button class="btn-faute b" onclick="openShotModal(1,'faute')">
      <span class="btn-icon">💥</span>
      <span class="btn-main">Faute directe</span>
      <span class="btn-sub">Choisir le coup</span>
    </button>
  </div>
</div>

<div class="actions">
  <button class="btn-action undo" onclick="undo()">↩ Annuler</button>
  <button class="btn-action pdf" onclick="exportPDF()">⬇ PDF</button>
  <button class="btn-action reset" onclick="resetMatch()">⟳ Reset</button>
</div>

<!-- Stats live -->
<div class="stats-card" id="statsCard">
  <div class="stats-title">Stats en direct</div>
  <div id="statsContent"></div>
</div>



<!-- Log -->
<div class="log-wrap">
  <div class="log-title">Journal du match</div>
  <div class="log-list" id="logList"></div>
</div>

<!-- Shot modal -->
<div class="modal-overlay" id="shotModal">
  <div class="modal">
    <div class="modal-context" id="modalContext">—</div>
    <div class="shot-grid" id="shotGrid"></div>
    <button class="modal-cancel" onclick="closeShotModal()">Annuler</button>
  </div>
</div>

<!-- Winner overlay -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-box">
    <div class="winner-trophy">🏆</div>
    <div class="winner-label">Vainqueur du match</div>
    <div class="winner-name" id="winnerName">—</div>
    <div class="winner-score" id="winnerScore">—</div>
    <div class="winner-stats">
      <div class="ws-box">
        <div class="ws-val a" id="ws-wA">0</div><div class="ws-lbl">Winners A</div>
        <div class="ws-val b" id="ws-wB" style="margin-top:6px">0</div><div class="ws-lbl">Winners B</div>
      </div>
      <div class="ws-box">
        <div class="ws-val a" id="ws-fA">0</div><div class="ws-lbl">Fautes A</div>
        <div class="ws-val b" id="ws-fB" style="margin-top:6px">0</div><div class="ws-lbl">Fautes B</div>
      </div>
    </div>
    <div class="winner-actions">
      <button class="winner-btn primary" onclick="exportPDF()">⬇ Télécharger PDF</button>
      <button class="winner-btn secondary" onclick="resetMatch()">Nouveau match</button>
    </div>
  </div>
</div>

<script>
// ── PLAYER NAMES ─────────────────────────────────────────────────────────────
const _p = new URLSearchParams(window.location.search);
const players = {
  j1: _p.get('j1') || 'Joueur 1',
  j2: _p.get('j2') || 'Joueur 2',
  j3: _p.get('j3') || 'Joueur 3',
  j4: _p.get('j4') || 'Joueur 4'
};
const nameA = players.j1 + ' / ' + players.j2;
const nameB = players.j3 + ' / ' + players.j4;

function initNames() {
  document.getElementById('playersA').textContent = nameA;
  document.getElementById('playersB').textContent = nameB;
  const shortA = players.j1.split(' ')[0] + ' & ' + players.j2.split(' ')[0];
  const shortB = players.j3.split(' ')[0] + ' & ' + players.j4.split(' ')[0];
  document.getElementById('lblA').textContent = 'Équipe A — ' + shortA;
  document.getElementById('lblB').textContent = 'Équipe B — ' + shortB;
  // update "Point à X" sub-labels
  document.querySelectorAll('.btn-faute.a .btn-sub')[0].textContent = 'Point à A';
  document.querySelectorAll('.btn-faute.b .btn-sub')[0].textContent = 'Point à B';
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let p1=0, p2=0, g1=0, g2=0, s1=0, s2=0;
let setHistory=[]; // [{a:g1,b:g2}, ...]
let inTiebreak=false, inSuperTiebreak=false, matchOver=false;
// Stats
const SHOTS = ['service','retour','smash','amorti','lob','rush'];
const SHOT_LBL = {service:'Service', retour:'Retour', smash:'Smash', amorti:'Amorti', lob:'Lob', rush:'Rush'};
const SHOT_ICO = {service:'🎾', retour:'↩️', smash:'💥', amorti:'🪶', lob:'🌙', rush:'⚡'};
function emptyStats(){
  const base = {pA:0, pB:0};
  for(const t of ['A','B']) for(const tp of ['w','f']) for(const s of SHOTS) base[tp+t+'_'+s]=0;
  return base;
}
let stats = emptyStats();

let history = [];
let matchLog = [];

const TP = ['0','15','30','40'];

// ── SAVE STATE ────────────────────────────────────────────────────────────────
function saveState() {
  history.push({
    p1,p2,g1,g2,s1,s2,inTiebreak,inSuperTiebreak,
    stats: JSON.parse(JSON.stringify(stats)),
    pill: document.getElementById('setPill').innerText,
    status: document.getElementById('statusLabel').innerText
  });
}

// ── SCORE LOGIC ───────────────────────────────────────────────────────────────
function scorePoint(player, type) {
  if (matchOver) return;
  saveState();

  // Record stats — pendingShot set by shot modal
  const shot = pendingShot || 'coup_droit';
  pendingShot = null;
  if (player === 1) {
    stats.pA++;
    if (type === 'winner') stats['wA_'+shot]++; else stats['fB_'+shot]++;
  } else {
    stats.pB++;
    if (type === 'winner') stats['wB_'+shot]++; else stats['fA_'+shot]++;
  }

  const teamName = player === 1 ? nameA : nameB;
  logPoint(teamName, type, shot);

  if (inSuperTiebreak) {
    if (player === 1) p1++; else p2++;
    if ((p1 >= 10 || p2 >= 10) && Math.abs(p1 - p2) >= 2) {
      logEvent(teamName, 'remporte le Super Tie-Break et le match !');
      winMatch(player); return;
    }
    updateDisplay(); return;
  }

  if (inTiebreak) {
    if (player === 1) p1++; else p2++;
    if ((p1 >= 7 || p2 >= 7) && Math.abs(p1 - p2) >= 2) {
      logEvent(teamName, 'remporte le Tie-Break !');
      winGame(player);
    }
    updateDisplay(); return;
  }

  // Normal game (No-Ad)
  if (player === 1) p1++; else p2++;
  if (p1 > 3 || p2 > 3) {
    if (p1 > p2) winGame(1); else winGame(2);
    return;
  }
  updateDisplay();
}

function winGame(player) {
  const wasTiebreak = inTiebreak;
  p1=0; p2=0; inTiebreak=false;
  if (player === 1) g1++; else g2++;
  logEvent(player===1 ? nameA : nameB, 'remporte le jeu → ' + g1 + '-' + g2);

  if (wasTiebreak) { winSet(player); return; }

  const maxG = Math.max(g1,g2), minG = Math.min(g1,g2);
  if (maxG >= 6 && maxG - minG >= 2) { winSet(player); return; }

  if (g1 === 6 && g2 === 6) {
    if (s1 === 1 && s2 === 1) {
      inSuperTiebreak=true; p1=0; p2=0;
      document.getElementById('setPill').textContent = 'Super Tie-Break';
      document.getElementById('statusLabel').textContent = "10 points, 2 d'écart";
      logEvent('', '⚡ Super Tie-Break (3e set) !');
    } else {
      inTiebreak=true; p1=0; p2=0;
      document.getElementById('setPill').textContent = 'Tie-Break';
      document.getElementById('statusLabel').textContent = "7 points, 2 d'écart";
      logEvent('', '🔀 Tie-Break !');
    }
  }
  updateDisplay();
}

function winSet(player) {
  setHistory.push({a:g1,b:g2});
  p1=0; p2=0; g1=0; g2=0; inTiebreak=false; inSuperTiebreak=false;
  if (player === 1) s1++; else s2++;
  logEvent(player===1 ? nameA : nameB, 'remporte le set ' + s1 + '-' + s2);
  if (s1 === 2 || s2 === 2) { winMatch(player); return; }
  document.getElementById('setPill').textContent = 'Set ' + (s1+s2+1);
  document.getElementById('statusLabel').textContent = 'En cours';
  updateDisplay();
}

function winMatch(player) {
  matchOver = true;
  // Stop timer when match ends
  if(timerRunning) timerToggle();
  const winner = player === 1 ? nameA : nameB;
  document.getElementById('winnerName').textContent = winner;
  document.getElementById('winnerScore').textContent = 'Sets ' + s1 + '-' + s2 + ' — ' + formatDuration(timerSeconds);
  const _totWA=SHOTS.reduce((s,sh)=>s+stats['wA_'+sh],0);
  const _totWB=SHOTS.reduce((s,sh)=>s+stats['wB_'+sh],0);
  const _totFA=SHOTS.reduce((s,sh)=>s+stats['fA_'+sh],0);
  const _totFB=SHOTS.reduce((s,sh)=>s+stats['fB_'+sh],0);
  document.getElementById('ws-wA').textContent = _totWA;
  document.getElementById('ws-wB').textContent = _totWB;
  document.getElementById('ws-fA').textContent = _totFA;
  document.getElementById('ws-fB').textContent = _totFB;
  document.getElementById('winnerOverlay').classList.add('show');
  logEvent(winner, '🏆 VAINQUEUR DU MATCH !');
  updateDisplay();
}

// ── UNDO ──────────────────────────────────────────────────────────────────────
function undo() {
  if (matchOver) { matchOver=false; document.getElementById('winnerOverlay').classList.remove('show'); }
  if (history.length === 0) { alert('Rien à annuler !'); return; }
  const last = history.pop();
  p1=last.p1; p2=last.p2; g1=last.g1; g2=last.g2; s1=last.s1; s2=last.s2;
  inTiebreak=last.inTiebreak; inSuperTiebreak=last.inSuperTiebreak;
  setHistory=last.setHistory||[];
  stats = JSON.parse(JSON.stringify(last.stats));
  document.getElementById('setPill').innerText = last.pill;
  document.getElementById('statusLabel').innerText = last.status;
  // Remove last log entry
  const list = document.getElementById('logList');
  if (list.firstChild) list.removeChild(list.firstChild);
  matchLog.shift();
  updateDisplay();
}

// ── DISPLAY ───────────────────────────────────────────────────────────────────
function updateDisplay() {
  let ptA, ptB;
  if (inSuperTiebreak || inTiebreak) {
    ptA=p1; ptB=p2;
  } else {
    ptA=TP[p1]||'0'; ptB=TP[p2]||'0';
    if (p1===3 && p2===3) { ptA='AD'; ptB='AD'; }
  }
  document.getElementById('ptA').textContent = ptA;
  document.getElementById('ptB').textContent = ptB;
  for(let i=1;i<=3;i++){
    const cellA=document.getElementById('setA'+i);
    const cellB=document.getElementById('setB'+i);
    if(i-1 < setHistory.length){
      const sh=setHistory[i-1];
      cellA.textContent=sh.a; cellB.textContent=sh.b;
      cellA.className='cell set-score '+(sh.a>sh.b?'won':'');
      cellB.className='cell set-score '+(sh.b>sh.a?'won':'');
    } else if(i-1 === setHistory.length){
      cellA.textContent=g1; cellB.textContent=g2;
      cellA.className='cell set-score active';
      cellB.className='cell set-score active';
    } else {
      cellA.textContent='—'; cellB.textContent='—';
      cellA.className='cell set-score'; cellB.className='cell set-score';
    }
  }

  renderStats();
}

function updateBar(idA, idB, vA, vB) {
  const total = vA + vB;
  const pct = total === 0 ? 50 : Math.round((vA/total)*100);
  document.getElementById(idA).style.width = pct + '%';
  document.getElementById(idB).style.width = (100-pct) + '%';
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function logPoint(winnerTeam, type, shot) {
  const isA = winnerTeam === nameA;
  const time = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  let label, dotClass, displayTeam;
  const shotLbl = SHOT_LBL[shot] || shot;
  const shotIco = SHOT_ICO[shot] || '';
  if (type === 'winner') {
    label = '🎯 '+shotLbl; dotClass = isA ? 'dot-a' : 'dot-b'; displayTeam = winnerTeam;
  } else {
    const faulter = isA ? nameB : nameA;
    label = '💥 '+shotLbl; dotClass = isA ? 'dot-b' : 'dot-a'; displayTeam = faulter;
  }
  const entry = {team: displayTeam, type, shot, time, msg: label};
  matchLog.unshift(entry);
  const list = document.getElementById('logList');
  const div = document.createElement('div');
  div.className = 'log-entry ' + dotClass;
  div.innerHTML = `<span class="dot"></span><span>${time} — <strong>${displayTeam}</strong></span><span class="log-tag ${type}">${label}</span>`;
  list.prepend(div);
}

function logEvent(team, msg) {
  const time = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const entry = {team, msg, time};
  matchLog.unshift(entry);
  const list = document.getElementById('logList');
  const div = document.createElement('div');
  div.className = 'log-entry event';
  div.innerHTML = `<span class="dot"></span><span>${time}${team?' — <strong>'+team+'</strong>':''} ${msg}</span>`;
  list.prepend(div);
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetMatch() {
  if (!confirm('Remettre le match à zéro ?')) return;
  p1=0;p2=0;g1=0;g2=0;s1=0;s2=0;
  inTiebreak=false;inSuperTiebreak=false;matchOver=false;
  setHistory=[];
  timerReset();
  stats=emptyStats();
  history=[];matchLog=[];
  document.getElementById('setPill').textContent='Set 1';
  document.getElementById('statusLabel').textContent='En cours';
  document.getElementById('logList').innerHTML='';
  document.getElementById('winnerOverlay').classList.remove('show');
  updateDisplay();
  logEvent('','🎾 Match démarré — '+nameA+' vs '+nameB);
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────────
function formatDuration(secs){
  const h=Math.floor(secs/3600);
  const m=Math.floor((secs%3600)/60);
  const s=secs%60;
  if(h>0) return h+'h '+String(m).padStart(2,'0')+'min '+String(s).padStart(2,'0')+'s';
  return String(m).padStart(2,'0')+'min '+String(s).padStart(2,'0')+'s';
}

function exportPDF() {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210, M=20;
  let y=M;

  // ── Fond sombre ──
  doc.setFillColor(8,15,30);
  doc.rect(0,0,W,297,'F');

  // ── Titre ──
  doc.setFont('helvetica','bold');
  doc.setFontSize(28);
  doc.setTextColor(245,197,24);
  doc.text('BEACH TENNIS', W/2, y+8, {align:'center'});
  doc.setFontSize(12);
  doc.setTextColor(74,100,148);
  doc.text('STATS AVANCÉES', W/2, y+16, {align:'center'});
  y+=26;

  // ── Date + durée ──
  doc.setFontSize(10);
  doc.setTextColor(74,100,148);
  doc.text(new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}), W/2, y, {align:'center'});
  y+=6;
  doc.setTextColor(245,197,24);
  doc.text('Durée du match : '+formatDuration(timerSeconds), W/2, y, {align:'center'});
  y+=10;

  doc.setDrawColor(30,53,96);
  doc.line(M,y,W-M,y);
  y+=10;

  // ── Équipes + score par set ──
  const teams = [
    {label:'ÉQUIPE A', color:[59,130,246], name:nameA, sets:s1},
    {label:'ÉQUIPE B', color:[249,115,22], name:nameB, sets:s2}
  ];
  teams.forEach((t,i) => {
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(...t.color);
    doc.text(t.label, M, y);
    doc.setFont('helvetica','normal');
    doc.setFontSize(13);
    doc.setTextColor(226,234,248);
    doc.text(t.name, M, y+7);
    // Score sets
    let setStr = '';
    setHistory.forEach((sh,idx) => {
      const sc = i===0 ? sh.a : sh.b;
      const opp = i===0 ? sh.b : sh.a;
      setStr += 'S'+(idx+1)+': '+sc+(sc>opp?'*':'')+' ';
    });
    if(setStr) {
      doc.setFontSize(10);
      doc.setTextColor(74,100,148);
      doc.text(setStr.trim(), M, y+13);
    }
    doc.setFont('helvetica','bold');
    doc.setFontSize(22);
    doc.setTextColor(245,197,24);
    doc.text(String(t.sets)+' set'+(t.sets>1?'s':''), W-M, y+6, {align:'right'});
    y += setStr ? 20 : 16;
    doc.setDrawColor(30,53,96);
    doc.line(M,y,W-M,y);
    y+=8;
  });

  y+=2;

  // ── Stats détaillées ──
  const totWA=SHOTS.reduce((s,sh)=>s+stats['wA_'+sh],0);
  const totWB=SHOTS.reduce((s,sh)=>s+stats['wB_'+sh],0);
  const totFA=SHOTS.reduce((s,sh)=>s+stats['fA_'+sh],0);
  const totFB=SHOTS.reduce((s,sh)=>s+stats['fB_'+sh],0);

  // Résumé totaux
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(245,197,24);
  doc.text('RÉSUMÉ', M, y);
  y+=6;
  const summary = [
    ['Points gagnants', totWA, totWB],
    ['Fautes directes', totFA, totFB],
    ['Points gagnés',   stats.pA, stats.pB],
  ];
  doc.setFontSize(9);
  doc.setTextColor(74,100,148);
  doc.text('Statistique', M, y);
  doc.text('Éq.A', W/2, y, {align:'center'});
  doc.text('Éq.B', W-M, y, {align:'right'});
  y+=4; doc.setDrawColor(30,53,96); doc.line(M,y,W-M,y); y+=5;
  summary.forEach(r => {
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(226,234,248);
    doc.text(r[0], M, y);
    doc.setFont('helvetica','bold');
    doc.setTextColor(59,130,246);  doc.text(String(r[1]), W/2, y, {align:'center'});
    doc.setTextColor(249,115,22); doc.text(String(r[2]), W-M, y, {align:'right'});
    y+=7;
  });
  doc.setDrawColor(30,53,96); doc.line(M,y,W-M,y); y+=10;

  // Détail par coup
  function pdfStatSection(title, prefix, colorTitle) {
    if(y>240){doc.addPage();y=M;doc.setFillColor(8,15,30);doc.rect(0,0,W,297,'F');}
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...colorTitle);
    doc.text(title, M, y); y+=6;
    doc.setFontSize(9); doc.setTextColor(74,100,148);
    doc.text('Coup', M, y);
    doc.text('Éq.A', W/2, y, {align:'center'});
    doc.text('Éq.B', W-M, y, {align:'right'});
    y+=4; doc.setDrawColor(30,53,96); doc.line(M,y,W-M,y); y+=5;
    SHOTS.forEach(s => {
      if(y>270){doc.addPage();y=M;doc.setFillColor(8,15,30);doc.rect(0,0,W,297,'F');}
      const vA = stats[prefix+'A_'+s];
      const vB = stats[prefix+'B_'+s];
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(226,234,248);
      doc.text(SHOT_LBL[s], M, y);
      doc.setFont('helvetica','bold');
      doc.setTextColor(59,130,246);  doc.text(String(vA), W/2, y, {align:'center'});
      doc.setTextColor(249,115,22); doc.text(String(vB), W-M, y, {align:'right'});
      y+=6;
    });
    doc.setDrawColor(30,53,96); doc.line(M,y,W-M,y); y+=4;
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(226,234,248);
    doc.text('Total', M, y);
    const tA = SHOTS.reduce((s,sh)=>s+stats[prefix+'A_'+sh],0);
    const tB = SHOTS.reduce((s,sh)=>s+stats[prefix+'B_'+sh],0);
    doc.setTextColor(59,130,246);  doc.text(String(tA), W/2, y, {align:'center'});
    doc.setTextColor(249,115,22); doc.text(String(tB), W-M, y, {align:'right'});
    y+=10;
  }

  pdfStatSection('POINTS GAGNANTS — détail par coup', 'w', [34,197,94]);
  pdfStatSection('FAUTES DIRECTES — détail par coup', 'f', [239,68,68]);

  // ── Journal ──
  if(y>240){doc.addPage();y=M;doc.setFillColor(8,15,30);doc.rect(0,0,W,297,'F');}
  doc.setDrawColor(30,53,96); doc.line(M,y,W-M,y); y+=10;
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(245,197,24);
  doc.text('JOURNAL DU MATCH', M, y); y+=8;

  [...matchLog].reverse().slice(0,40).forEach(entry => {
    if(y>272){doc.addPage();y=M;doc.setFillColor(8,15,30);doc.rect(0,0,W,297,'F');}
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.setTextColor(74,100,148);
    doc.text(entry.time, M, y);
    doc.setTextColor(180,200,230);
    const txt = (entry.team ? entry.team+' — ':'')+entry.msg;
    doc.text(txt, M+16, y);
    y+=6;
  });

  doc.save('BeachStats_Avancees_'+new Date().toISOString().slice(0,10)+'.pdf');
}

// ── SHOT MODAL ───────────────────────────────────────────────────────────────
let pendingPlayer = null;
let pendingType = null;
let pendingShot = null;

function openShotModal(player, type) {
  if (matchOver) return;
  pendingPlayer = player;
  pendingType = type;
  const isWinner = type === 'winner';
  const teamName = player === 1 ? nameA : nameB;
  const actionTeam = isWinner ? teamName : (player === 1 ? nameB : nameA);
  const ctx = document.getElementById('modalContext');
  ctx.innerHTML = `<span>${isWinner ? '🎯 Point gagnant par' : '💥 Faute directe de'}</span>${actionTeam}`;
  const grid = document.getElementById('shotGrid');
  grid.innerHTML = '';
  for(const s of SHOTS){
    const btn = document.createElement('button');
    btn.className = 'shot-btn type-'+type;
    btn.innerHTML = `<span class="s-ico">${SHOT_ICO[s]}</span>${SHOT_LBL[s]}`;
    btn.onclick = () => confirmShot(s);
    grid.appendChild(btn);
  }
  document.getElementById('shotModal').classList.add('show');
}

function closeShotModal() {
  pendingPlayer = null; pendingType = null;
  document.getElementById('shotModal').classList.remove('show');
}

function confirmShot(shot) {
  document.getElementById('shotModal').classList.remove('show');
  pendingShot = shot;
  scorePoint(pendingPlayer, pendingType);
  pendingPlayer = null; pendingType = null;
}

// ── RENDER STATS ──────────────────────────────────────────────────────────────
function renderStats() {
  const el = document.getElementById('statsContent');
  let html = '';

  // totals
  const totWA = SHOTS.reduce((s,sh)=>s+stats['wA_'+sh],0);
  const totWB = SHOTS.reduce((s,sh)=>s+stats['wB_'+sh],0);
  const totFA = SHOTS.reduce((s,sh)=>s+stats['fA_'+sh],0);
  const totFB = SHOTS.reduce((s,sh)=>s+stats['fB_'+sh],0);

  function bar(a,b){const t=a+b||1;return`<div class="mini-bar"><div class="mini-bar-a" style="width:${Math.round(a/t*100)}%"></div><div class="mini-bar-b" style="width:${Math.round(b/t*100)}%"></div></div>`;}

  // Winners section
  html += `<div class="stats-section">
    <div class="stats-section-title w">🎯 Points gagnants — <span style="color:var(--blue)">${totWA}</span> / <span style="color:var(--orange)">${totWB}</span></div>
    <table class="stats-table">`;
  for(const s of SHOTS){
    const vA=stats['wA_'+s], vB=stats['wB_'+s];
    html+=`<tr>
      <td class="td-a">${vA}</td>
      <td class="td-bar">${bar(vA,vB)}<div class="td-lbl" style="margin-top:2px">${SHOT_ICO[s]} ${SHOT_LBL[s]}</div></td>
      <td class="td-b">${vB}</td>
    </tr>`;
  }
  html += '</table></div>';

  // Fautes section
  html += `<div class="stats-section">
    <div class="stats-section-title f">💥 Fautes directes — <span style="color:var(--blue)">${totFA}</span> / <span style="color:var(--orange)">${totFB}</span></div>
    <table class="stats-table">`;
  for(const s of SHOTS){
    const vA=stats['fA_'+s], vB=stats['fB_'+s];
    html+=`<tr>
      <td class="td-a">${vA}</td>
      <td class="td-bar">${bar(vA,vB)}<div class="td-lbl" style="margin-top:2px">${SHOT_ICO[s]} ${SHOT_LBL[s]}</div></td>
      <td class="td-b">${vB}</td>
    </tr>`;
  }
  html += '</table></div>';

  // Totals row
  html += `<div class="stats-totals">
    <div class="tot-box"><div class="tot-val"><span class="a">${totWA}</span><span style="color:var(--muted)">/</span><span class="b">${totWB}</span></div><div class="tot-lbl">Winners</div></div>
    <div class="tot-box"><div class="tot-val"><span class="a">${totFA}</span><span style="color:var(--muted)">/</span><span class="b">${totFB}</span></div><div class="tot-lbl">Fautes</div></div>
    <div class="tot-box"><div class="tot-val"><span class="a">${stats.pA}</span><span style="color:var(--muted)">/</span><span class="b">${stats.pB}</span></div><div class="tot-lbl">Points</div></div>
  </div>`;

  el.innerHTML = html;
}

// ── TIMER ────────────────────────────────────────────────────────────────────
let timerSeconds = 0;
let timerInterval = null;
let timerRunning = false;

function timerToggle() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerStartBtn').textContent = '▶ Start';
    document.getElementById('timerStartBtn').className = 'timer-btn start';
    document.getElementById('timerDisplay').classList.remove('running');
  } else {
    timerRunning = true;
    document.getElementById('timerStartBtn').textContent = '⏸ Pause';
    document.getElementById('timerStartBtn').className = 'timer-btn pause';
    document.getElementById('timerDisplay').classList.add('running');
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds / 60)).padStart(2,'0');
      const s = String(timerSeconds % 60).padStart(2,'0');
      document.getElementById('timerDisplay').textContent = m + ':' + s;
    }, 1000);
  }
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerDisplay').classList.remove('running');
  document.getElementById('timerStartBtn').textContent = '▶ Start';
  document.getElementById('timerStartBtn').className = 'timer-btn start';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
initNames();
updateDisplay();
logEvent('', '🎾 Match démarré — '+nameA+' vs '+nameB);
</script>
