<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Tennis – Stats Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* ── VARIABLES DE COULEURS ── */
        :root {
            --bg: #080f1e;
            --card: #111e35;
            --border: #1e3560;
            --gold: #f5c518;
            --blue: #3b82f6;
            --orange: #f97316;
            --green: #22c55e;
            --red: #ef4444;
            --text: #e2eaf8;
            --muted: #4a6494;
        }

        /* ── RESET & BASE ── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            padding-bottom: 50px;
        }

        /* ── LAYOUT (CONTENEURS) ── */
        .container { width: 100%; max-width: 550px; }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* ── HEADER & SCOREBOARD ── */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
        .logo { font-family: 'Barlow Condensed'; font-weight: 900; color: var(--gold); font-size: 24px; }

        .scoreboard { width: 100%; border-collapse: collapse; text-align: center; }
        .scoreboard th { font-family: 'Barlow Condensed'; color: var(--muted); font-size: 12px; padding-bottom: 10px; }
        .team-name { text-align: left; font-family: 'Barlow Condensed'; font-weight: 700; font-size: 16px; }
        .score-val { font-size: 20px; font-weight: 900; font-family: 'Barlow Condensed'; width: 40px; }
        .pts-val { font-size: 30px; color: var(--gold); font-style: italic; width: 70px; }
        .won-set { color: var(--gold); }

        /* ── BOUTONS D'ACTION ── */
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        button { 
            cursor: pointer; 
            font-family: 'Barlow Condensed'; 
            text-transform: uppercase; 
            transition: 0.2s; 
            border: 1px solid var(--border);
        }

        .btn-point { padding: 12px; border-radius: 10px; font-weight: 700; border: 2px solid; }
        .btn-winner { background: rgba(34, 197, 94, 0.1); border-color: var(--green); color: var(--green); }
        .btn-error { background: rgba(239, 68, 68, 0.1); border-color: var(--red); color: var(--red); }
        
        .btn-util { padding: 8px; border-radius: 8px; background: var(--card); color: var(--text); font-size: 12px; }

        /* ── MODAL (CHOIX DU COUP) ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .modal { background: var(--card); border: 2px solid var(--border); border-radius: 20px; width: 100%; max-width: 450px; padding: 20px; }
        .modal-title { text-align: center; margin-bottom: 20px; font-family: 'Barlow Condensed'; font-size: 18px; }
        
        .shot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .shot-group { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; text-align: center; }
        .shot-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; display: block; }
        
        .btn-shot { width: 100%; padding: 10px; border-radius: 8px; font-weight: 700; background: var(--border); color: white; border: none; margin-bottom: 5px; }

        /* ── STATS ── */
        .stat-bar-container { height: 6px; background: #1e3560; border-radius: 3px; overflow: hidden; margin: 10px 0; display: flex; }
        .bar-a { background: var(--blue); height: 100%; }
        .bar-b { background: var(--orange); height: 100%; }
        .stat-row { display: flex; justify-content: space-between; font-size: 12px; font-family: 'Barlow Condensed'; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">BEACH/STATS</div>
        <div id="matchTime" style="font-family: 'Barlow Condensed'; font-size: 20px; color: var(--gold);">00:00</div>
    </div>

    <div class="card">
        <table class="scoreboard">
            <thead>
                <tr>
                    <th>ÉQUIPE</th>
                    <th>S1</th><th>S2</th><th>S3</th>
                    <th>PTS</th>
                </tr>
            </thead>
            <tbody>
                <tr style="color: var(--blue);">
                    <td class="team-name" id="nameA">Équipe A</td>
                    <td class="score-val" id="s1A">-</td>
                    <td class="score-val" id="s2A">-</td>
                    <td class="score-val" id="s3A">-</td>
                    <td class="pts-val" id="ptsA">0</td>
                </tr>
                <tr style="color: var(--orange);">
                    <td class="team-name" id="nameB">Équipe B</td>
                    <td class="score-val" id="s1B">-</td>
                    <td class="score-val" id="s2B">-</td>
                    <td class="score-val" id="s3B">-</td>
                    <td class="pts-val" id="ptsB">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div style="color: var(--blue); font-size: 11px; font-weight: 700; margin-left: 5px;">ACTIONS ÉQUIPE A</div>
    <div class="grid-btns">
        <button class="btn-point btn-winner" onclick="openShotModal(1, 'winner')">🏆 Winner</button>
        <button class="btn-point btn-error" onclick="openShotModal(2, 'error')">💥 Faute A</button>
    </div>

    <br>

    <div style="color: var(--orange); font-size: 11px; font-weight: 700; margin-left: 5px;">ACTIONS ÉQUIPE B</div>
    <div class="grid-btns" style="margin-bottom: 20px;">
        <button class="btn-point btn-winner" onclick="openShotModal(2, 'winner')">🏆 Winner</button>
        <button class="btn-point btn-error" onclick="openShotModal(1, 'error')">💥 Faute B</button>
    </div>

    <div class="grid-btns" style="grid-template-columns: 1fr 1fr 1fr;">
        <button class="btn-util" onclick="undo()">↩ Annuler</button>
        <button class="btn-util" onclick="exportPDF()">⬇ PDF</button>
        <button class="btn-util" onclick="resetMatch()" style="color: var(--red);">Reset</button>
    </div>

    <div class="card" style="margin-top: 20px;">
        <div style="font-family: 'Barlow Condensed'; font-size: 14px; color: var(--muted); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px;">STATISTIQUES DU MATCH</div>
        <div id="statsRender">
            </div>
    </div>
</div>

<div class="modal-overlay" id="shotModal">
    <div class="modal">
        <div class="modal-title" id="modalTitle">Quel coup ?</div>
        <div class="shot-grid" id="modalGrid">
            </div>
        <button class="btn-util" style="width: 100%; margin-top: 20px;" onclick="closeModal()">Fermer</button>
    </div>
</div>

<script>
/* ── CONFIGURATION & DONNÉES ── */
const SHOTS_CONFIG = [
    { id: 'service', label: 'Service', simple: true },
    { id: 'smash',   label: 'Smash',   simple: true },
    { id: 'retour',  label: 'Retour',  simple: false },
    { id: 'amorti',  label: 'Amorti',  simple: false },
    { id: 'lob',     label: 'Lob',     simple: false },
    { id: 'rush',    label: 'Rush',    simple: false }
];

const TENNIS_POINTS = ['0', '15', '30', '40'];

// État global
let state = {
    pA: 0, pB: 0, // Points dans le jeu
    gA: 0, gB: 0, // Jeux dans le set
    sA: 0, sB: 0, // Sets gagnés
    sets: [],     // Historique des scores des sets : [{a:6, b:4}]
    stats: {},    // { 'winner_amorti_cd_A': 5 }
    history: [],  // Pour le bouton Annuler
    matchOver: false
};

/* ── LOGIQUE DU SCORE ── */

function openShotModal(scoringPlayer, type) {
    if (state.matchOver) return;
    
    const grid = document.getElementById('modalGrid');
    grid.innerHTML = '';
    
    // On génère les boutons dynamiquement
    SHOTS_CONFIG.forEach(shot => {
        const group = document.createElement('div');
        group.className = 'shot-group';
        
        if (shot.simple) {
            group.innerHTML = `<button class="btn-shot" onclick="confirmPoint(${scoringPlayer}, '${type}', '${shot.id}')">${shot.label}</button>`;
        } else {
            group.innerHTML = `
                <span class="shot-label">${shot.label}</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-shot" onclick="confirmPoint(${scoringPlayer}, '${type}', '${shot.id}_cd')">CD</button>
                    <button class="btn-shot" onclick="confirmPoint(${scoringPlayer}, '${type}', '${shot.id}_rev')">REV</button>
                </div>`;
        }
        grid.appendChild(group);
    });

    document.getElementById('shotModal').style.display = 'flex';
}

function confirmPoint(player, type, shotKey) {
    saveToHistory();
    closeModal();

    // Enregistrement de la stat
    // format: winner_amorti_cd_A ou error_service_B
    const statKey = `${type}_${shotKey}_${player === 1 ? 'A' : 'B'}`;
    state.stats[statKey] = (state.stats[statKey] || 0) + 1;

    // Logique Tennis simplifiée (No-Ad)
    if (player === 1) state.pA++; else state.pB++;

    if (state.pA > 3 || state.pB > 3) {
        winGame(player);
    }
    
    updateUI();
}

function winGame(player) {
    state.pA = 0; state.pB = 0;
    if (player === 1) state.gA++; else state.gB++;

    // Set gagné ? (à 6 jeux)
    if (state.gA >= 6 || state.gB >= 6) {
        state.sets.push({ a: state.gA, b: state.gB });
        if (player === 1) state.sA++; else state.sB++;
        state.gA = 0; state.gB = 0;
    }

    // Match fini ?
    if (state.sA === 2 || state.sB === 2) {
        state.matchOver = true;
        alert("Match terminé !");
    }
}

/* ── INTERFACE (UI) ── */

function updateUI() {
    // Points
    document.getElementById('ptsA').textContent = TENNIS_POINTS[state.pA] || '0';
    document.getElementById('ptsB').textContent = TENNIS_POINTS[state.pB] || '0';

    // Jeux et Sets
    for (let i = 0; i < 3; i++) {
        const setA = document.getElementById(`s${i+1}A`);
        const setB = document.getElementById(`s${i+1}B`);
        
        if (state.sets[i]) {
            setA.textContent = state.sets[i].a;
            setB.textContent = state.sets[i].b;
            setA.className = 'score-val' + (state.sets[i].a > state.sets[i].b ? ' won-set' : '');
            setB.className = 'score-val' + (state.sets[i].b > state.sets[i].a ? ' won-set' : '');
        } else if (i === state.sets.length) {
            setA.textContent = state.gA;
            setB.textContent = state.gB;
            setA.className = 'score-val'; setB.className = 'score-val';
        } else {
            setA.textContent = '-'; setB.textContent = '-';
        }
    }

    renderStats();
}

function renderStats() {
    const container = document.getElementById('statsRender');
    container.innerHTML = '';

    // On calcule les totaux
    let totalWinA = 0, totalWinB = 0;
    
    // Liste de tous les coups possibles pour itérer
    const keys = Object.keys(state.stats);
    
    // Exemple d'affichage simplifié (Total Winners / Total Fautes)
    keys.forEach(k => {
        if(k.startsWith('winner_')) {
            if(k.endsWith('_A')) totalWinA += state.stats[k];
            else totalWinB += state.stats[k];
        }
    });

    const percentA = (totalWinA + totalWinB) === 0 ? 50 : (totalWinA / (totalWinA + totalWinB) * 100);

    container.innerHTML = `
        <div class="stat-row">
            <span>EQUIPE A</span>
            <span style="color:var(--gold)">WINNERS TOTAL</span>
            <span>EQUIPE B</span>
        </div>
        <div class="stat-row" style="margin-top:5px; font-size:20px;">
            <span style="color:var(--blue)">${totalWinA}</span>
            <span style="color:var(--orange)">${totalWinB}</span>
        </div>
        <div class="stat-bar-container">
            <div class="bar-a" style="width: ${percentA}%"></div>
            <div class="bar-b" style="width: ${100 - percentA}%"></div>
        </div>
        <p style="font-size:10px; color:var(--muted); text-align:center; margin-top:10px;">Seuls les winners totaux sont affichés ici, le PDF contient le détail complet.</p>
    `;
}

/* ── FONCTIONS UTILES ── */

function saveToHistory() {
    state.history.push(JSON.stringify(state));
}

function undo() {
    if (state.history.length > 0) {
        state = JSON.parse(state.history.pop());
        updateUI();
    }
}

function closeModal() { document.getElementById('shotModal').style.display = 'none'; }

function resetMatch() {
    if(confirm("Tout effacer ?")) {
        location.reload();
    }
}

// Timer simple
let seconds = 0;
setInterval(() => {
    if (state.matchOver) return;
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('matchTime').textContent = `${m}:${s}`;
}, 1000);

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("RAPPORT DE MATCH BEACH TENNIS", 10, 10);
    doc.text(`Score: ${state.sA} - ${state.sB}`, 10, 20);
    doc.text("Détail des stats:", 10, 30);
    
    let y = 40;
    Object.keys(state.stats).forEach(key => {
        doc.text(`${key}: ${state.stats[key]}`, 15, y);
        y += 7;
    });
    
    doc.save("stats_match.pdf");
}

// Initialisation
updateUI();

</script>
</body>
</html>
