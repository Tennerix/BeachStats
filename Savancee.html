<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beach Tennis – Stats Avancées</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* [LE CSS RESTE IDENTIQUE POUR NE PAS CHANGER L'APPARENCE] */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#080f1e;--surface:#0d1829;--card:#111e35;--border:#1e3560;--gold:#f5c518;--blue:#3b82f6;--orange:#f97316;--green:#22c55e;--red:#ef4444;--purple:#a855f7;--text:#e2eaf8;--muted:#4a6494}body{font-family:Barlow,sans-serif;min-height:100vh;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;padding:0 1rem 4rem}.header{width:100%;max-width:580px;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.2rem}.header-logo{font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}.header-logo span{color:var(--text);opacity:.5}.header-back{background:none;border:1px solid var(--border);color:var(--muted);font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:8px;cursor:pointer;transition:all .18s}.header-back:hover{border-color:var(--gold);color:var(--gold)}.status-bar{width:100%;max-width:580px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.75rem 1.4rem;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1rem}.status-pill{font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--bg);background:var(--gold);padding:4px 14px;border-radius:20px}.status-label{font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}.scoreboard{width:100%;max-width:580px;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 8px 48px rgba(0,0,0,.5);margin-bottom:1rem}.score-header{display:grid;grid-template-columns:1fr 44px 44px 44px 80px;padding:.6rem 1.4rem;background:var(--surface);border-bottom:1px solid var(--border)}.score-header span{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center}.score-header span:first-child{text-align:left}.team-row{display:grid;grid-template-columns:1fr 44px 44px 44px 80px;align-items:center;padding:1rem 1.4rem;border-bottom:1px solid var(--border);transition:background .15s}.team-row:last-child{border-bottom:none}.team-info{display:flex;flex-direction:column;gap:3px}.team-name{font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase}.team-players{font-size:11px;color:var(--muted);font-weight:500}.team-row.team-a .team-name{color:var(--blue)}.team-row.team-b .team-name{color:var(--orange)}.cell{text-align:center;font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900}.cell.sets-cell span{display:inline-block;width:28px;height:28px;line-height:28px;border-radius:50%;font-size:14px;font-weight:900}.cell.sets-cell span.won{background:var(--gold);color:var(--bg)}.cell.set-score{font-family:Barlow Condensed,sans-serif;font-size:18px;font-weight:900;text-align:center;color:var(--muted)}.cell.set-score.active{color:var(--text)}.cell.set-score.won{color:var(--gold)}.cell.point-cell{font-size:36px;color:var(--gold);font-style:italic}.stats-card{width:100%;max-width:580px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.2rem 1.4rem;margin-bottom:1rem}.stats-title{font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:8px}.stats-title::after{content:'';flex:1;height:1px;background:var(--border)}.stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:.7rem}.stat-row:last-child{margin-bottom:0}.stat-val{font-family:Barlow Condensed,sans-serif;font-size:24px;font-weight:900}.stat-val.a{color:var(--blue);text-align:right}.stat-val.b{color:var(--orange);text-align:left}.stat-name{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:center;white-space:nowrap}.stat-bar-wrap{grid-column:1/-1;display:flex;height:4px;border-radius:4px;overflow:hidden;background:var(--surface)}.stat-bar-a{background:var(--blue);transition:width .4s}.stat-bar-b{background:var(--orange);transition:width .4s}.team-controls{width:100%;max-width:580px;margin-bottom:.8rem}.team-ctrl-label{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;padding-left:4px}.team-ctrl-label.a{color:var(--blue)}.team-ctrl-label.b{color:var(--orange)}.ctrl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn-winner,.btn-faute{padding:.9rem .8rem;border-radius:14px;border:2px solid;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1;font-family:Barlow Condensed,sans-serif}.btn-winner:active,.btn-faute:active{transform:scale(.96)}.btn-icon{font-size:22px}.btn-main{font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase}.btn-sub{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.6}.btn-winner.a,.btn-winner.b{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}.btn-winner.a:hover,.btn-winner.b:hover{background:rgba(34,197,94,.22);transform:scale(1.02)}.btn-faute.a,.btn-faute.b{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red)}.btn-faute.a:hover,.btn-faute.b:hover{background:rgba(239,68,68,.2);transform:scale(1.02)}.actions{width:100%;max-width:580px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}.btn-action{padding:.75rem;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}.btn-action:hover{background:#162040;border-color:var(--muted)}.btn-action.undo{border-color:#f59e0b;color:#f59e0b}.btn-action.undo:hover{background:rgba(245,158,11,.12)}.btn-action.reset{border-color:var(--red);color:var(--red)}.btn-action.reset:hover{background:rgba(239,68,68,.12)}.btn-action.pdf{border-color:var(--green);color:var(--green)}.btn-action.pdf:hover{background:rgba(34,197,94,.12)}.log-wrap{width:100%;max-width:580px}.log-title{font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;padding-left:4px}.log-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.45rem 1rem;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}.log-entry .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}.log-entry.dot-a .dot{background:var(--blue)}.log-entry.dot-b .dot{background:var(--orange)}.log-entry.dot-w .dot{background:var(--green)}.log-entry.dot-f .dot{background:var(--red)}.log-entry.event .dot{background:var(--gold)}.log-tag{margin-left:auto;font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px}.log-tag.winner{background:rgba(34,197,94,.15);color:var(--green)}.log-tag.faute{background:rgba(239,68,68,.15);color:var(--red)}.winner-overlay{display:none;position:fixed;inset:0;background:rgba(8,15,30,.92);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;padding:2rem}.winner-overlay.show{display:flex}.winner-box{background:var(--card);border:2px solid var(--gold);border-radius:24px;padding:2.5rem 2rem;text-align:center;max-width:400px;width:100%;box-shadow:0 0 80px rgba(245,197,24,.2)}.winner-trophy{font-size:60px;margin-bottom:1rem}.winner-label{font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:.5rem}.winner-name{font-family:Barlow Condensed,sans-serif;font-size:32px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:.4rem}.winner-score{font-family:Barlow Condensed,sans-serif;font-size:16px;color:var(--muted);letter-spacing:1px;margin-bottom:1.2rem}.winner-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.4rem}.ws-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.8rem}.ws-val{font-family:Barlow Condensed,sans-serif;font-size:28px;font-weight:900}.ws-val.a{color:var(--blue)}.ws-val.b{color:var(--orange)}.ws-lbl{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}.winner-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.winner-btn{padding:.7rem 1.4rem;border-radius:10px;border:1.5px solid;font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}.winner-btn.primary{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.1)}.winner-btn.primary:hover{background:rgba(245,197,24,.25)}.winner-btn.secondary{border-color:var(--border);color:var(--muted);background:none}.winner-btn.secondary:hover{border-color:var(--muted);color:var(--text)}.timer-wrap{width:100%;max-width:580px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:.9rem 1.4rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:12px}.timer-display{font-family:Barlow Condensed,sans-serif;font-size:38px;font-weight:900;letter-spacing:4px;color:var(--gold);font-variant-numeric:tabular-nums;min-width:110px}.timer-display.running{color:#fff}.timer-btns{display:flex;gap:8px}.timer-btn{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}.timer-btn:hover{background:#162040;border-color:var(--muted)}.timer-btn.start{border-color:var(--green);color:var(--green)}.timer-btn.start:hover{background:rgba(34,197,94,.12)}.timer-btn.pause{border-color:var(--gold);color:var(--gold)}.timer-btn.pause:hover{background:rgba(245,197,24,.12)}.timer-btn.stop{border-color:var(--red);color:var(--red)}.timer-btn.stop:hover{background:rgba(239,68,68,.12)}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(8,15,30,.88);z-index:50;align-items:flex-end;justify-content:center;padding:1rem}.modal-overlay.show{display:flex}.modal{background:var(--card);border:1px solid var(--border);border-radius:24px 24px 20px 20px;width:100%;max-width:520px;padding:1.4rem 1.2rem 1.8rem;box-shadow:0 -8px 48px rgba(0,0,0,.6)}.modal-context{font-family:Barlow Condensed,sans-serif;font-size:17px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-align:center;margin-bottom:1rem;color:var(--text)}.modal-context span{display:block;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:4px}.shot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}.shot-group{display:flex;flex-direction:column;gap:5px;background:rgba(255,255,255,0.03);padding:8px;border-radius:14px;border:1px solid var(--border)}.shot-group-title{font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:2px}.shot-sub-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.shot-btn{padding:.7rem .3rem;border-radius:12px;border:2px solid;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;line-height:1.2;text-align:center}.shot-btn:active{transform:scale(.95)}.shot-btn .s-ico{font-size:20px}.shot-btn.type-winner{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.08)}.shot-btn.type-winner:hover{background:rgba(34,197,94,.2)}.shot-btn.type-faute{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08)}.shot-btn.type-faute:hover{background:rgba(239,68,68,.2)}.modal-cancel{width:100%;padding:.65rem;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-family:Barlow Condensed,sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}.modal-cancel:hover{border-color:var(--muted);color:var(--text)}.stats-section{margin-bottom:.8rem}.stats-section-title{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:6px}.stats-section-title.w{color:var(--green)}.stats-section-title.f{color:var(--red)}.stats-table{width:100%;border-collapse:collapse}.stats-table tr{border-bottom:1px solid var(--border)}.stats-table tr:last-child{border-bottom:none}.stats-table td{padding:.35rem .2rem;font-family:Barlow Condensed,sans-serif;font-size:14px;font-weight:700;vertical-align:middle}.stats-table .td-lbl{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;line-height:1.1}.stats-table .td-a{color:var(--blue);text-align:right;font-size:18px;width:36px}.stats-table .td-b{color:var(--orange);text-align:left;font-size:18px;width:36px}.stats-table .td-bar{padding:0 .4rem}.mini-bar{height:5px;border-radius:4px;overflow:hidden;background:var(--surface);display:flex}.mini-bar-a{background:var(--blue);transition:width .3s}.mini-bar-b{background:var(--orange);transition:width .3s}.stats-totals{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:.6rem}.tot-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem;text-align:center}.tot-val{font-family:Barlow Condensed,sans-serif;font-size:11px;font-weight:900;display:flex;justify-content:center;gap:8px}.tot-val span.a{color:var(--blue)}.tot-val span.b{color:var(--orange)}.tot-lbl{font-family:Barlow Condensed,sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px}@media(max-width:440px){.score-header,.team-row{grid-template-columns:1fr 36px 36px 36px 64px;padding:.8rem .7rem}.cell.point-cell{font-size:28px}.shot-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">Beach<span>/</span>Stats</div>
    <button class="header-back" onclick="window.location.href='index.html'">← Accueil</button>
</div>

<div class="status-bar">
    <div class="status-pill" id="setPill">Set 1</div>
    <div class="status-label" id="statusLabel">En cours</div>
</div>

<div class="timer-wrap">
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-btns">
        <button class="timer-btn start" id="timerStartBtn" onclick="timerToggle()">▶ Start</button>
    </div>
</div>

<div class="scoreboard">
    <div class="score-header">
        <span>Équipe</span><span>S1</span><span>S2</span><span>S3</span><span>Points</span>
    </div>
    <div class="team-row team-a" id="rowA">
        <div class="team-info">
            <div class="team-name" id="nameA">Équipe A</div>
            <div class="team-players" id="playersA">—</div>
        </div>
        <div class="cell set-score" id="setA1">—</div>
        <div class="cell set-score" id="setA2">—</div>
        <div class="cell set-score" id="setA3">—</div>
        <div class="cell point-cell" id="ptA">0</div>
    </div>
    <div class="team-row team-b" id="rowB">
        <div class="team-info">
            <div class="team-name" id="nameB">Équipe B</div>
            <div class="team-players" id="playersB">—</div>
        </div>
        <div class="cell set-score" id="setB1">—</div>
        <div class="cell set-score" id="setB2">—</div>
        <div class="cell set-score" id="setB3">—</div>
        <div class="cell point-cell" id="ptB">0</div>
    </div>
</div>

<div class="team-controls">
    <div class="team-ctrl-label a" id="lblA">Équipe A</div>
    <div class="ctrl-row">
        <button class="btn-winner a" onclick="openShotModal(1,'winner')">
            <span class="btn-icon">🎯</span><span class="btn-main">Point gagnant</span><span class="btn-sub">Coup gagnant</span>
        </button>
        <button class="btn-faute a" onclick="openShotModal(2,'faute')">
            <span class="btn-icon">💥</span><span class="btn-main">Faute directe</span><span class="btn-sub">Point à A</span>
        </button>
    </div>
</div>

<div class="team-controls">
    <div class="team-ctrl-label b" id="lblB">Équipe B</div>
    <div class="ctrl-row">
        <button class="btn-winner b" onclick="openShotModal(2,'winner')">
            <span class="btn-icon">🎯</span><span class="btn-main">Point gagnant</span><span class="btn-sub">Coup gagnant</span>
        </button>
        <button class="btn-faute b" onclick="openShotModal(1,'faute')">
            <span class="btn-icon">💥</span><span class="btn-main">Faute directe</span><span class="btn-sub">Point à B</span>
        </button>
    </div>
</div>

<div class="actions">
    <button class="btn-action undo" onclick="undo()">↩ Annuler</button>
    <button class="btn-action pdf" onclick="exportPDF()">⬇ PDF</button>
    <button class="btn-action reset" onclick="resetMatch()">⟳ Reset</button>
</div>

<div class="stats-card">
    <div class="stats-title">Stats détaillées</div>
    <div id="statsContent"></div>
</div>

<div class="log-wrap">
    <div class="log-title">Journal du match</div>
    <div class="log-list" id="logList"></div>
</div>

<div class="modal-overlay" id="shotModal">
    <div class="modal">
        <div class="modal-context" id="modalContext">—</div>
        <div class="shot-grid" id="shotGrid"></div>
        <button class="modal-cancel" onclick="closeShotModal()">Annuler</button>
    </div>
</div>

<div class="winner-overlay" id="winnerOverlay">
    <div class="winner-box">
        <div class="winner-trophy">🏆</div>
        <div class="winner-label">Vainqueur du match</div>
        <div class="winner-name" id="winnerName">—</div>
        <div class="winner-score" id="winnerScore">—</div>
        <div class="winner-stats">
            <div class="ws-box">
                <div class="ws-val a" id="ws-wA">0</div><div class="ws-lbl">Winners A</div>
                <div class="ws-val b" id="ws-wB" style="margin-top:6px">0</div><div class="ws-lbl">Winners B</div>
            </div>
            <div class="ws-box">
                <div class="ws-val a" id="ws-fA">0</div><div class="ws-lbl">Fautes A</div>
                <div class="ws-val b" id="ws-fB" style="margin-top:6px">0</div><div class="ws-lbl">Fautes B</div>
            </div>
        </div>
        <div class="winner-actions">
            <button class="winner-btn primary" onclick="exportPDF()">⬇ Télécharger PDF</button>
            <button class="winner-btn secondary" onclick="resetMatch()">Nouveau match</button>
        </div>
    </div>
</div>

<script>
/** * CONFIGURATION & CONSTANTES
 */
const BASE_SHOTS = ['service', 'smash', 'retour', 'amorti', 'lob', 'rush'];
const SHOT_LBL = {
    service:'Service', smash:'Smash', retour:'Retour', retour_cd:'Retour CD', retour_rev:'Retour REV',
    amorti:'Amorti', amorti_cd:'Amorti CD', amorti_rev:'Amorti REV', lob:'Lob', lob_cd:'Lob CD', 
    lob_rev:'Lob REV', rush:'Rush', rush_cd:'Rush CD', rush_rev:'Rush REV'
};
const SHOT_ICO = {service:'🎾', smash:'💥', retour:'↩️', amorti:'🪶', lob:'🌙', rush:'⚡'};
const ALL_SHOT_KEYS = ['service', 'smash', 'retour_cd', 'retour_rev', 'amorti_cd', 'amorti_rev', 'lob_cd', 'lob_rev', 'rush_cd', 'rush_rev'];
const TP = ['0', '15', '30', '40'];

/**
 * ÉTAT DU MATCH
 */
let p1=0, p2=0, g1=0, g2=0, s1=0, s2=0;
let setHistory = [], history = [], matchLog = [];
let inTiebreak = false, inSuperTiebreak = false, matchOver = false;
let pendingShot = null, pendingPlayer = null, pendingType = null;

// Initialisation des noms via URL
const _p = new URLSearchParams(window.location.search);
const players = {
    j1: _p.get('j1') || 'Joueur 1', j2: _p.get('j2') || 'Joueur 2',
    j3: _p.get('j3') || 'Joueur 3', j4: _p.get('j4') || 'Joueur 4'
};
const nameA = `${players.j1} / ${players.j2}`;
const nameB = `${players.j3} / ${players.j4}`;

/**
 * STATISTIQUES
 */
function emptyStats() {
    const base = { pA: 0, pB: 0 };
    ['A', 'B'].forEach(t => {
        ['w', 'f'].forEach(tp => {
            ALL_SHOT_KEYS.forEach(s => base[tp + t + '_' + s] = 0);
        });
    });
    return base;
}
let stats = emptyStats();

/**
 * LOGIQUE DE JEU
 */
function scorePoint(player, type) {
    if (matchOver) return;
    saveState();

    const shot = pendingShot || 'service';
    pendingShot = null;

    // Enregistrement stats
    if (player === 1) {
        stats.pA++;
        type === 'winner' ? stats['wA_' + shot]++ : stats['fB_' + shot]++;
    } else {
        stats.pB++;
        type === 'winner' ? stats['wB_' + shot]++ : stats['fA_' + shot]++;
    }

    logPoint(player === 1 ? nameA : nameB, type, shot);

    // Cas Tie-break
    if (inTiebreak || inSuperTiebreak) {
        player === 1 ? p1++ : p2++;
        const limit = inSuperTiebreak ? 10 : 7;
        if ((p1 >= limit || p2 >= limit) && Math.abs(p1 - p2) >= 2) {
            inSuperTiebreak ? winMatch(player) : winGame(player);
        }
    } else {
        // Jeu normal
        player === 1 ? p1++ : p2++;
        if (p1 > 3 || p2 > 3) winGame(p1 > p2 ? 1 : 2);
    }
    updateDisplay();
}

function winGame(player) {
    const wasTiebreak = inTiebreak;
    p1 = 0; p2 = 0; inTiebreak = false;
    player === 1 ? g1++ : g2++;
    logEvent(player === 1 ? nameA : nameB, `remporte le jeu (${g1}-${g2})`);

    if (wasTiebreak) return winSet(player);

    const maxG = Math.max(g1, g2), minG = Math.min(g1, g2);
    if (maxG >= 6 && maxG - minG >= 2) return winSet(player);

    if (g1 === 6 && g2 === 6) {
        inTiebreak = true;
        const isSuper = (s1 === 1 && s2 === 1);
        if (isSuper) inSuperTiebreak = true;
        document.getElementById('setPill').textContent = isSuper ? 'Super Tie-Break' : 'Tie-Break';
        document.getElementById('statusLabel').textContent = isSuper ? "10 pts" : "7 pts";
    }
}

function winSet(player) {
    setHistory.push({ a: g1, b: g2 });
    g1 = 0; g2 = 0; inTiebreak = false; inSuperTiebreak = false;
    player === 1 ? s1++ : s2++;
    logEvent(player === 1 ? nameA : nameB, `remporte le set (${s1}-${s2})`);

    if (s1 === 2 || s2 === 2) winMatch(player);
    else {
        document.getElementById('setPill').textContent = `Set ${s1 + s2 + 1}`;
        document.getElementById('statusLabel').textContent = 'En cours';
    }
}

function winMatch(player) {
    matchOver = true;
    if (timerRunning) timerToggle();
    const winner = player === 1 ? nameA : nameB;
    
    // Calcul totaux pour l'overlay final
    const getSum = (prefix) => ALL_SHOT_KEYS.reduce((s, sh) => s + stats[prefix + sh], 0);
    
    document.getElementById('winnerName').textContent = winner;
    document.getElementById('winnerScore').textContent = `Sets ${s1}-${s2} — ${formatDuration(timerSeconds)}`;
    document.getElementById('ws-wA').textContent = getSum('wA_');
    document.getElementById('ws-wB').textContent = getSum('wB_');
    document.getElementById('ws-fA').textContent = getSum('fA_');
    document.getElementById('ws-fB').textContent = getSum('fB_');
    document.getElementById('winnerOverlay').classList.add('show');
    logEvent(winner, '🏆 VICTOIRE !');
}

/**
 * AFFICHAGE & UI
 */
function updateDisplay() {
    // Points (Conversion 15, 30, 40 sauf tie-break)
    const isTB = inTiebreak || inSuperTiebreak;
    document.getElementById('ptA').textContent = isTB ? p1 : (p1 === 3 && p2 === 3 ? '40' : TP[p1] || '0');
    document.getElementById('ptB').textContent = isTB ? p2 : (p1 === 3 && p2 === 3 ? '40' : TP[p2] || '0');

    // Sets
    for (let i = 1; i <= 3; i++) {
        const cA = document.getElementById('setA' + i), cB = document.getElementById('setB' + i);
        if (i - 1 < setHistory.length) {
            const sh = setHistory[i - 1];
            cA.textContent = sh.a; cB.textContent = sh.b;
            cA.className = `cell set-score ${sh.a > sh.b ? 'won' : ''}`;
            cB.className = `cell set-score ${sh.b > sh.a ? 'won' : ''}`;
        } else if (i - 1 === setHistory.length && !matchOver) {
            cA.textContent = g1; cB.textContent = g2;
            cA.className = 'cell set-score active'; cB.className = 'cell set-score active';
        } else {
            cA.textContent = '—'; cB.textContent = '—';
            cA.className = 'cell set-score'; cB.className = 'cell set-score';
        }
    }
    renderStats();
}

function renderStats() {
    const el = document.getElementById('statsContent');
    const getSum = (prefix) => ALL_SHOT_KEYS.reduce((s, sh) => s + stats[prefix + sh], 0);
    const [tWA, tWB, tFA, tFB] = [getSum('wA_'), getSum('wB_'), getSum('fA_'), getSum('fB_')];

    const generateTable = (type, title, colorA, colorB, totA, totB) => {
        let rows = ALL_SHOT_KEYS.map(s => {
            const vA = stats[type + 'A_' + s], vB = stats[type + 'B_' + s];
            if (vA === 0 && vB === 0) return '';
            const pc = Math.round(vA / (vA + vB || 1) * 100);
            return `<tr><td class="td-a">${vA}</td><td class="td-bar"><div class="mini-bar"><div class="mini-bar-a" style="width:${pc}%"></div><div class="mini-bar-b" style="width:${100 - pc}%"></div></div><div class="td-lbl">${SHOT_LBL[s]}</div></td><td class="td-b">${vB}</td></tr>`;
        }).join('');
        return `<div class="stats-section"><div class="stats-section-title ${type}">${title} — <span style="color:${colorA}">${totA}</span> / <span style="color:${colorB}">${totB}</span></div><table class="stats-table">${rows}</table></div>`;
    };

    el.innerHTML = generateTable('w', '🎯 Points gagnants', 'var(--blue)', 'var(--orange)', tWA, tWB) +
                   generateTable('f', '💥 Fautes directes', 'var(--blue)', 'var(--orange)', tFA, tFB) +
                   `<div class="stats-totals">
                        <div class="tot-box"><div class="tot-val"><span class="a">${tWA}</span>/ <span class="b">${tWB}</span></div><div class="tot-lbl">Winners</div></div>
                        <div class="tot-box"><div class="tot-val"><span class="a">${tFA}</span>/ <span class="b">${tFB}</span></div><div class="tot-lbl">Fautes</div></div>
                        <div class="tot-box"><div class="tot-val"><span class="a">${stats.pA}</span>/ <span class="b">${stats.pB}</span></div><div class="tot-lbl">Points Totaux</div></div>
                    </div>`;
}

/**
 * MODAL & ACTIONS
 */
function openShotModal(player, type) {
    if (matchOver) return;
    pendingPlayer = player; pendingType = type;
    const team = (type === 'winner' ? (player === 1 ? nameA : nameB) : (player === 1 ? nameB : nameA));
    
    document.getElementById('modalContext').innerHTML = `<span>${type === 'winner' ? '🎯 Point gagnant par' : '💥 Faute directe de'}</span>${team}`;
    const grid = document.getElementById('shotGrid');
    grid.innerHTML = '';

    BASE_SHOTS.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shot-group';
        if (s === 'service' || s === 'smash') {
            div.innerHTML = `<button class="shot-btn type-${type}" onclick="confirmShot('${s}')"><span class="s-ico">${SHOT_ICO[s]}</span>${SHOT_LBL[s]}</button>`;
        } else {
            div.innerHTML = `<div class="shot-group-title">${SHOT_ICO[s]} ${SHOT_LBL[s]}</div><div class="shot-sub-row">
                <button class="shot-btn type-${type}" onclick="confirmShot('${s}_cd')">CD</button>
                <button class="shot-btn type-${type}" onclick="confirmShot('${s}_rev')">REV</button></div>`;
        }
        grid.appendChild(div);
    });
    document.getElementById('shotModal').classList.add('show');
}

function confirmShot(key) { pendingShot = key; closeShotModal(); scorePoint(pendingPlayer, pendingType); }
function closeShotModal() { document.getElementById('shotModal').classList.remove('show'); }

function saveState() {
    history.push(JSON.parse(JSON.stringify({ p1, p2, g1, g2, s1, s2, inTiebreak, inSuperTiebreak, setHistory, stats, pill: document.getElementById('setPill').innerText, status: document.getElementById('statusLabel').innerText })));
}

function undo() {
    if (history.length === 0) return;
    matchOver = false; document.getElementById('winnerOverlay').classList.remove('show');
    const last = history.pop();
    Object.assign(window, last); // Restaure les variables globales
    stats = last.stats; setHistory = last.setHistory;
    document.getElementById('setPill').innerText = last.pill;
    document.getElementById('statusLabel').innerText = last.status;
    document.getElementById('logList').removeChild(document.getElementById('logList').firstChild);
    updateDisplay();
}

/**
 * UTILS (TIMER, LOG, PDF)
 */
let timerSeconds = 0, timerInterval = null, timerRunning = false;
function timerToggle() {
    const btn = document.getElementById('timerStartBtn');
    if (timerRunning) {
        clearInterval(timerInterval); timerRunning = false;
        btn.textContent = '▶ Start'; btn.className = 'timer-btn start';
    } else {
        timerRunning = true; btn.textContent = '⏸ Pause'; btn.className = 'timer-btn pause';
        timerInterval = setInterval(() => {
            timerSeconds++;
            const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
            const s = String(timerSeconds % 60).padStart(2, '0');
            document.getElementById('timerDisplay').textContent = `${m}:${s}`;
        }, 1000);
    }
}

function formatDuration(secs) { return `${Math.floor(secs / 60)}m ${secs % 60}s`; }

function logPoint(team, type, shot) {
    const isW = type === 'winner';
    const list = document.getElementById('logList');
    const div = document.createElement('div');
    div.className = `log-entry ${isW ? (team === nameA ? 'dot-a' : 'dot-b') : (team === nameA ? 'dot-b' : 'dot-a')}`;
    div.innerHTML = `<span class="dot"></span><span>${new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })} — <strong>${team}</strong></span><span class="log-tag ${type}">${isW ? '🎯' : '💥'} ${SHOT_LBL[shot]}</span>`;
    list.prepend(div);
}

function logEvent(team, msg) {
    const div = document.createElement('div');
    div.className = 'log-entry event';
    div.innerHTML = `<span class="dot"></span><span>${new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })} ${team ? '— <strong>' + team + '</strong>' : ''} ${msg}</span>`;
    document.getElementById('logList').prepend(div);
}

function resetMatch() {
    if (confirm('Remettre à zéro ?')) location.reload();
}

function exportPDF() {
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    doc.setFontSize(18); doc.text("Rapport Beach Tennis", 14, 20);
    doc.setFontSize(12); doc.text(`${nameA} vs ${nameB}`, 14, 30);
    doc.text(`Score Final: ${s1} - ${s2}`, 14, 38);
    let y = 50;
    ['Winner', 'Faute'].forEach(type => {
        doc.text(`Stats ${type}s:`, 14, y); y += 7;
        ALL_SHOT_KEYS.forEach(s => {
            const keyA = (type === 'Winner' ? 'wA_' : 'fA_') + s, keyB = (type === 'Winner' ? 'wB_' : 'fB_') + s;
            if (stats[keyA] || stats[keyB]) { doc.text(`${SHOT_LBL[s]}: A(${stats[keyA]}) - B(${stats[keyB]})`, 20, y); y += 6; }
        });
        y += 4;
    });
    doc.save(`Match_${Date.now()}.pdf`);
}

// Init
document.getElementById('playersA').textContent = nameA;
document.getElementById('playersB').textContent = nameB;
document.getElementById('lblA').textContent = `Équipe A — ${players.j1.split(' ')[0]} & ${players.j2.split(' ')[0]}`;
document.getElementById('lblB').textContent = `Équipe B — ${players.j3.split(' ')[0]} & ${players.j4.split(' ')[0]}`;
updateDisplay();
logEvent('', '🎾 Match démarré');
</script>
</body>
</html>
