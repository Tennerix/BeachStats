<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Tennis — Score & Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

  /* ── VARIABLES GLOBALES ─────────────────────────────────────── */
  :root {
    --sand: #F5E6C8;
    --sand-dark: #E8D0A0;
    --ocean: #1A6B8A;
    --ocean-light: #2A8BAF;
    --ocean-dark: #0D4A62;
    --sun: #F4A927;
    --sun-light: #FAC85A;
    --white: #FEFCF7;
    --dark: #1C1A15;
    --gray: #6B6558;
    --gray-light: #C8BFA8;
    --green: #2E8B57;
    --red: #C0392B;
    --radius: 14px;
    --radius-sm: 8px;
  }

  /* ── RESET & BASE ───────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Dégradé de fond décoratif (non interactif) */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 0%, rgba(26,107,138,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(244,169,39,0.12) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Conteneur principal centré, au-dessus du fond */
  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* ── HEADER ─────────────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 20px 0;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--sun); letter-spacing: -0.5px; }
  .logo span { color: var(--ocean-light); }

  /* ── NAVIGATION PAR ONGLETS ─────────────────────────────────── */
  .nav {
    display: flex; gap: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 50px;
    padding: 5px;
    margin: 20px 20px 0;
  }
  .nav button {
    flex: 1; padding: 9px 0; border: none; background: transparent;
    color: var(--gray-light); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    border-radius: 50px; cursor: pointer; transition: all 0.2s;
  }
  .nav button.active { background: var(--ocean); color: var(--white); }

  /* ── PAGES (une seule visible à la fois) ────────────────────── */
  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  /* ── CARTES GÉNÉRIQUES ──────────────────────────────────────── */
  .card {
    background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-title {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray-light);
    margin-bottom: 14px;
  }

  /* ── TABLEAU DE SCORE ───────────────────────────────────────── */
  .score-board {
    background: linear-gradient(135deg, var(--ocean-dark), var(--ocean));
    border-radius: var(--radius);
    padding: 24px 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  /* Emoji décoratif en filigrane */
  .score-board::after {
    content: '🏐';
    position: absolute; right: -10px; top: -10px;
    font-size: 80px; opacity: 0.08; transform: rotate(15deg);
  }
  .score-players { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .score-player { flex: 1; text-align: center; }
  .score-player-name {
    font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .score-vs { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600; }

  /* Ligne des sets */
  .sets-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; }
  .set-box {
    text-align: center; min-width: 40px;
    background: rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 10px;
  }
  .set-box .set-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.5); }
  .set-box .set-scores { display: flex; gap: 8px; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .set-box.current { background: rgba(255,255,255,0.2); } /* set en cours mis en avant */

  /* Score en jeux (gros chiffres centraux) */
  .game-score-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
  .game-score { font-family: 'Syne', sans-serif; font-size: 56px; font-weight: 800; line-height: 1; text-shadow: 0 2px 20px rgba(0,0,0,0.3); }
  .game-score-label { font-size: 11px; color: rgba(255,255,255,0.5); text-align: center; margin-top: 4px; }
  .game-score-sep { font-size: 28px; color: rgba(255,255,255,0.3); font-weight: 300; }

  /* ── BOUTONS +POINT ─────────────────────────────────────────── */
  .point-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .point-btn {
    padding: 18px 10px;
    border: none; border-radius: var(--radius); cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    transition: all 0.15s; text-align: center; line-height: 1.3;
  }
  .point-btn .btn-name { font-size: 13px; font-weight: 400; display: block; margin-top: 2px; opacity: 0.8; }
  .point-btn.p1 { background: var(--ocean); color: white; }
  .point-btn.p2 { background: var(--sun); color: var(--dark); }
  .point-btn:active { transform: scale(0.96); }

  /* ── BOUTONS DE CONTRÔLE (annuler / arrêter) ────────────────── */
  .controls { display: flex; gap: 8px; }
  .ctrl-btn {
    flex: 1; padding: 11px; border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); color: var(--white);
    border-radius: var(--radius-sm); cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; transition: background 0.15s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
  .ctrl-btn.danger { border-color: rgba(192,57,43,0.4); color: #e74c3c; }
  .ctrl-btn.danger:hover { background: rgba(192,57,43,0.15); }

  /* ── BADGE DE STATUT (deuce / avantage) ─────────────────────── */
  .status-badge {
    text-align: center; padding: 8px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm); margin-bottom: 14px;
    background: rgba(244,169,39,0.15); color: var(--sun-light);
    border: 0.5px solid rgba(244,169,39,0.3);
  }

  /* ── MODAL VAINQUEUR ────────────────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--dark); border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 32px 24px; text-align: center; width: 100%;
    max-width: 340px;
  }
  .modal-emoji { font-size: 64px; margin-bottom: 12px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--sun); margin-bottom: 6px; }
  .modal-sub { color: var(--gray-light); font-size: 15px; margin-bottom: 24px; }
  .modal-btn {
    width: 100%; padding: 14px; background: var(--ocean); color: white;
    border: none; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 10px;
  }
  .modal-btn.secondary { background: rgba(255,255,255,0.08); margin-bottom: 0; }

  /* ── FORMULAIRE DE CONFIGURATION ────────────────────────────── */
  .setup-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .setup-sub { color: var(--gray-light); font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-light); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
  input[type=text], select {
    width: 100%; padding: 13px 14px;
    background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: var(--radius-sm); color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 15px; margin-bottom: 16px; outline: none; transition: border-color 0.2s;
    appearance: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--ocean-light); }
  select option { background: #1C1A15; }
  .start-btn {
    width: 100%; padding: 16px; background: var(--ocean); color: white;
    border: none; border-radius: var(--radius); font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700; cursor: pointer; transition: background 0.2s;
    margin-top: 6px;
  }
  .start-btn:hover { background: var(--ocean-light); }

  /* Sélecteur de format (Format Court / Format Pro) */
  .format-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .format-opt {
    padding: 12px; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-sm); cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .format-opt.selected { background: rgba(26,107,138,0.3); border-color: var(--ocean-light); }
  .format-opt .fopt-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .format-opt .fopt-sub { font-size: 11px; color: var(--gray-light); margin-top: 2px; }

  /* ── PAGE STATS ─────────────────────────────────────────────── */
  .stats-empty { text-align: center; padding: 48px 20px; color: var(--gray-light); }
  .stats-empty .emoji { font-size: 48px; margin-bottom: 12px; }
  .player-stat-card {
    background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .psc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .psc-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--ocean); display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: white; flex-shrink: 0;
  }
  .psc-avatar.p2 { background: var(--sun); color: var(--dark); }
  .psc-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .psc-record { font-size: 13px; color: var(--gray-light); }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat-pill { background: rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px; text-align: center; }
  .stat-pill .val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--white); }
  .stat-pill .lbl { font-size: 10px; color: var(--gray-light); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .win-bar-wrap { margin-top: 12px; }
  .win-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-light); margin-bottom: 5px; }
  .win-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .win-bar-fill { height: 100%; border-radius: 3px; background: var(--ocean); transition: width 0.5s; }

  /* ── PAGE HISTORIQUE ────────────────────────────────────────── */
  /* Item dans la liste récente d'un joueur (page Stats) */
  .match-history-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 0.5px solid rgba(255,255,255,0.07);
  }
  .match-history-item:last-child { border-bottom: none; }
  .mhi-result { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
  .mhi-result.win  { background: rgba(46,139,87,0.2); color: #4CAF50; }
  .mhi-result.loss { background: rgba(192,57,43,0.2); color: #e74c3c; }
  .mhi-info { flex: 1; min-width: 0; }
  .mhi-vs    { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mhi-score { font-size: 11px; color: var(--gray-light); }
  .mhi-date  { font-size: 11px; color: var(--gray-light); flex-shrink: 0; }

  /* Carte de match dans l'onglet Historique */
  .history-match-card {
    background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
  }
  .hmc-top    { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hmc-names  { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
  .hmc-date   { font-size: 11px; color: var(--gray-light); }
  .hmc-score  { font-size: 13px; color: var(--gray-light); }
  .hmc-winner { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: rgba(244,169,39,0.2); color: var(--sun); margin-top: 4px; }

  /* ── TOAST "POINT ANNULÉ" ───────────────────────────────────── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(26,107,138,0.95); color: white;
    padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 50;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Label de section (ex : "Classement des joueurs") */
  .section-label {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--gray-light);
    margin: 20px 0 10px;
  }

</style>
</head>
<body>

<div class="app">

  <!-- EN-TÊTE -->
  <div class="header">
    <div class="logo">Beach<span>Tennis</span></div>
    <div style="font-size: 12px; color: var(--gray-light);">🏝️ Score & Stats</div>
  </div>

  <!-- BARRE DE NAVIGATION -->
  <div class="nav">
    <button class="active" onclick="showPage('match')">🎾 Match</button>
    <button onclick="showPage('stats')">📊 Stats</button>
    <button onclick="showPage('history')">📋 Historique</button>
  </div>

  <!-- PAGE MATCH -->
  <div class="page active" id="page-match">

    <!-- Panneau de configuration (visible au lancement) -->
    <div id="setup-panel">
      <div class="setup-title">Nouveau match 🏐</div>
      <div class="setup-sub">Configurez les joueurs et le format</div>

      <label>Joueur 1</label>
      <input type="text" id="p1-name" placeholder="Prénom du joueur 1" maxlength="20">

      <label>Joueur 2</label>
      <input type="text" id="p2-name" placeholder="Prénom du joueur 2" maxlength="20">

      <label>Format du match</label>
      <div class="format-row">
        <div class="format-opt selected" onclick="selectFormat('short')" id="fmt-short">
          <div class="fopt-title">Format Court</div>
          <div class="fopt-sub">1 set / 4 jeux</div>
        </div>
        <div class="format-opt" onclick="selectFormat('long')" id="fmt-long">
          <div class="fopt-title">Format Long</div>
          <div class="fopt-sub">2 sets / Super Tie Break</div>
        </div>
      </div>

      <label>Décompte des points</label>
      <select id="score-mode">
        <option value="tennis">Tennis (0 / 15 / 30 / 40)</option>
        <option value="simple">Simple (1 / 2 / 3 / 4)</option>
      </select>

      <button class="start-btn" onclick="startMatch()">▶ Commencer le match</button>
    </div>

    <!-- Panneau de score (caché au lancement) -->
    <div id="score-panel" style="display:none">
      <div class="score-board">
        <!-- Noms des joueurs -->
        <div class="score-players">
          <div class="score-player"><div class="score-player-name" id="sb-p1">Joueur 1</div></div>
          <div class="score-vs">VS</div>
          <div class="score-player"><div class="score-player-name" id="sb-p2">Joueur 2</div></div>
        </div>

        <!-- Sets passés + jeu en cours (rempli par renderScore) -->
        <div class="sets-row" id="sets-row"></div>

        <!-- Score en jeux (gros chiffres) -->
        <div class="game-score-row">
          <div>
            <div class="game-score" id="gs-p1">0</div>
            <div class="game-score-label" id="gsl-p1">jeux</div>
          </div>
          <div class="game-score-sep">—</div>
          <div>
            <div class="game-score" id="gs-p2">0</div>
            <div class="game-score-label" id="gsl-p2">jeux</div>
          </div>
        </div>
      </div>

      <!-- Badge deuce/avantage (caché par défaut) -->
      <div id="status-badge" class="status-badge" style="display:none"></div>

      <!-- Boutons +Point -->
      <div class="point-btns">
        <button class="point-btn p1" onclick="addPoint(0)">
          ＋ Point
          <span class="btn-name" id="btn-p1-name">Joueur 1</span>
        </button>
        <button class="point-btn p2" onclick="addPoint(1)">
          ＋ Point
          <span class="btn-name" id="btn-p2-name">Joueur 2</span>
        </button>
      </div>

      <!-- Contrôles secondaires -->
      <div class="controls">
        <button class="ctrl-btn" onclick="undoPoint()">↩ Annuler</button>
        <button class="ctrl-btn danger" onclick="confirmNewMatch()">✕ Arrêter</button>
      </div>
    </div>
  </div>

  <!-- PAGE STATS (remplie dynamiquement) -->
  <div class="page" id="page-stats">
    <div id="stats-content"></div>
  </div>

  <!-- PAGE HISTORIQUE (remplie dynamiquement) -->
  <div class="page" id="page-history">
    <div id="history-content"></div>
  </div>

</div>

<!-- MODAL VAINQUEUR -->
<div class="modal-overlay" id="winner-modal">
  <div class="modal">
    <div class="modal-emoji">🏆</div>
    <div class="modal-title" id="modal-winner-name">Joueur 1</div>
    <div class="modal-sub" id="modal-score-summary">a remporté le match !</div>
    <button class="modal-btn" onclick="saveAndNew()">🔄 Nouveau match</button>
    <button class="modal-btn secondary" onclick="closeModal()">📊 Voir les stats</button>
  </div>
</div>

<!-- Toast de notification (ex : "Point annulé") -->
<div class="toast" id="toast">Point annulé</div>

<script>

  // ── CONSTANTES ──────────────────────────────────────────────────
  // Labels de points selon le mode choisi
  const SCORE_LABELS = {
    tennis: ['0', '15', '30', '40', 'A'],
    simple: ['0', '1',  '2',  '3',  '4']
  };

  // ── ÉTAT DU MATCH ────────────────────────────────────────────────
  let state = {
    p1: 'Joueur 1', p2: 'Joueur 2',
    format: 'short',        // 'short' (1 set/4 jeux) | 'long' (2 sets/6 jeux + Super Tie Break)
    scoreMode: 'tennis',
    maxSets: 1, maxGames: 4,
    sets: [],               // historique des sets terminés [{p1, p2}]
    currentSet: 0,
    games: [0, 0],          // jeux gagnés dans le set en cours
    points: [0, 0],         // points dans le jeu en cours
    deuce: false,
    advantage: -1,          // 0 = J1, 1 = J2, -1 = personne
    superTieBreak: false,   // true quand on joue le Super Tie Break (3e set format long)
    history: [],            // pile pour l'annulation (undo)
    matchOver: false
  };

  // ── CONFIGURATION ────────────────────────────────────────────────

  // Met à jour le format sélectionné (UI + state)
  function selectFormat(f) {
    state.format = f;
    document.querySelectorAll('.format-opt').forEach(e => e.classList.remove('selected'));
    document.getElementById('fmt-' + f).classList.add('selected');
  }

  // Lance le match à partir des valeurs du formulaire
  function startMatch() {
    const p1  = document.getElementById('p1-name').value.trim()  || 'Joueur 1';
    const p2  = document.getElementById('p2-name').value.trim()  || 'Joueur 2';
    const fmt = state.format;
    const mode = document.getElementById('score-mode').value;

    // Réinitialisation complète de l'état
    state = {
      p1, p2,
      format: fmt,
      scoreMode: mode,
      maxSets:  fmt === 'long' ? 3 : 1,   // 3 pour gérer 2 sets + éventuel STB
      maxGames: fmt === 'long' ? 6 : 4,
      sets: [], currentSet: 0,
      games: [0, 0], points: [0, 0],
      deuce: false, advantage: -1,
      superTieBreak: false,
      history: [], matchOver: false
    };

    // Bascule setup → score
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('score-panel').style.display = 'block';

    // Met à jour les noms affichés
    document.getElementById('sb-p1').textContent      = p1;
    document.getElementById('sb-p2').textContent      = p2;
    document.getElementById('btn-p1-name').textContent = p1;
    document.getElementById('btn-p2-name').textContent = p2;

    renderScore();
  }

  // ── LOGIQUE DE SCORE ─────────────────────────────────────────────

  // Ajoute un point au joueur (0 ou 1) et gère deuce/avantage/jeu gagné
  function addPoint(player) {
    if (state.matchOver) return;

    // Sauvegarde l'état actuel pour permettre l'annulation
    state.history.push(JSON.stringify({
      sets: state.sets, currentSet: state.currentSet,
      games: [...state.games], points: [...state.points],
      deuce: state.deuce, advantage: state.advantage,
      superTieBreak: state.superTieBreak, matchOver: state.matchOver
    }));
    if (state.history.length > 50) state.history.shift(); // limite la pile à 50

    const opp = 1 - player; // index de l'adversaire

    // ── Super Tie Break : comptage direct jusqu'à 10 avec 2 d'écart ──
    if (state.superTieBreak) {
      state.points[player]++;
      const p = state.points[player];
      const o = state.points[opp];
      if (p >= 10 && p - o >= 2) {
        // STB remporté → victoire dans le match
        state.sets.push({ p1: state.points[0], p2: state.points[1] });
        endMatch(player);
      }
      renderScore();
      return;
    }

    if (state.deuce) {
      // En situation de deuce : gestion de l'avantage
      if (state.advantage === player) {
        winGame(player);              // avantage confirmé → jeu gagné
      } else if (state.advantage === opp) {
        state.advantage = -1;         // l'adversaire avait l'avantage → retour à égalité
      } else {
        state.advantage = player;     // depuis l'égalité → avantage
      }
    } else {
      state.points[player]++;
      const p = state.points[player];
      const o = state.points[opp];

      if (p >= 4) {
        if (o >= 3) {
          // Zone deuce (40-40 ou plus)
          if (p === 4 && o === 3) { state.deuce = true; state.advantage = player; } // 40-40 premier passage
          else if (p === 4 && o === 4) { state.deuce = true; state.advantage = -1; } // égalité stricte
          else { winGame(player); }    // avantage décisif
        } else {
          winGame(player);             // victoire nette (ex : 40-0, 40-15, 40-30)
        }
      } else if (p === 3 && o === 3) {
        state.deuce = true; state.advantage = -1; // 40-40 premier passage depuis les deux côtés
      }
    }

    renderScore();
  }

  // Valide le jeu et vérifie si le set ou le match est terminé
  function winGame(player) {
    state.games[player]++;
    state.points = [0, 0];
    state.deuce  = false;
    state.advantage = -1;

    const mg = state.maxGames;
    const g0 = state.games[0], g1 = state.games[1];
    let setWinner = -1;

    if (mg === 4) {
      // Format Court : premier à 4 avec 2 d'écart, ou premier à 5 (tiebreak à 3-3)
      if ((g0 >= 4 && g0 - g1 >= 2) || g0 === 5) setWinner = 0;
      else if ((g1 >= 4 && g1 - g0 >= 2) || g1 === 5) setWinner = 1;
    } else {
      // Format Long : premier à 6 avec 2 d'écart, ou 7 (tiebreak)
      if ((g0 >= 6 && g0 - g1 >= 2) || g0 === 7) setWinner = 0;
      else if ((g1 >= 6 && g1 - g0 >= 2) || g1 === 7) setWinner = 1;
    }

    if (setWinner >= 0) {
      // Set terminé : on l'archive et on passe au suivant
      state.sets.push({ p1: state.games[0], p2: state.games[1] });
      state.games = [0, 0];
      state.currentSet++;

      const setsWon = [
        state.sets.filter(s => s.p1 > s.p2).length,
        state.sets.filter(s => s.p2 > s.p1).length
      ];
      const needed = Math.ceil(state.maxSets / 2); // nombre de sets à remporter (2 pour long)

      if (setsWon[0] >= needed) endMatch(0);
      else if (setsWon[1] >= needed) endMatch(1);
      else if (state.format === 'long' && setsWon[0] === 1 && setsWon[1] === 1) {
        // Égalité 1-1 en Format Long → Super Tie Break
        state.superTieBreak = true;
      }
    }
  }

  // Fin du match : affiche la modal vainqueur
  function endMatch(winner) {
    state.matchOver = true;
    const names = [state.p1, state.p2];
    const scoreStr = state.sets.map(s => s.p1 + '-' + s.p2).join(' | ');

    document.getElementById('modal-winner-name').textContent = '🏆 ' + names[winner];
    document.getElementById('modal-score-summary').textContent = 'remporte le match — ' + scoreStr;
    document.getElementById('winner-modal').classList.add('show');
  }

  // ── ACTIONS MODAL ────────────────────────────────────────────────

  // Sauvegarde le match et retourne à la configuration
  function saveAndNew() {
    saveMatchToHistory();
    closeModal();
    resetToSetup();
  }

  // Ferme la modal ; si le match est terminé, bascule sur les stats
  function closeModal() {
    document.getElementById('winner-modal').classList.remove('show');
    if (state.matchOver) showPage('stats');
  }

  // ── HISTORIQUE (localStorage) ────────────────────────────────────

  // Enregistre le match courant dans le localStorage
  function saveMatchToHistory() {
    const history = getStoredHistory();
    const setsWon = [
      state.sets.filter(s => s.p1 > s.p2).length,
      state.sets.filter(s => s.p2 > s.p1).length
    ];
    const winner   = setsWon[0] > setsWon[1] ? state.p1 : state.p2;
    const scoreStr = state.sets.map(s => s.p1 + '-' + s.p2).join(', ');

    history.unshift({
      id: Date.now(),
      date: new Date().toLocaleDateString('fr-FR'),
      p1: state.p1, p2: state.p2,
      setsP1: setsWon[0], setsP2: setsWon[1],
      scoreStr, winner,
      format: state.format
    });
    localStorage.setItem('bt_history', JSON.stringify(history.slice(0, 100))); // max 100 matchs
  }

  // Récupère l'historique depuis le localStorage (tableau vide si absent/corrompu)
  function getStoredHistory() {
    try { return JSON.parse(localStorage.getItem('bt_history') || '[]'); }
    catch { return []; }
  }

  // ── NAVIGATION & CONTRÔLES ───────────────────────────────────────

  // Retourne à l'écran de configuration
  function resetToSetup() {
    document.getElementById('setup-panel').style.display = 'block';
    document.getElementById('score-panel').style.display = 'none';
  }

  // Demande confirmation avant d'arrêter le match en cours
  function confirmNewMatch() {
    if (confirm('Arrêter le match en cours ?')) {
      if (!state.matchOver && state.sets.length > 0) saveMatchToHistory();
      resetToSetup();
    }
  }

  // Annule le dernier point (dépile l'historique d'états)
  function undoPoint() {
    if (state.history.length === 0) return;
    const prev = JSON.parse(state.history.pop());
    state.sets          = prev.sets;
    state.currentSet    = prev.currentSet;
    state.games         = prev.games;
    state.points        = prev.points;
    state.deuce         = prev.deuce;
    state.advantage     = prev.advantage;
    state.superTieBreak = prev.superTieBreak;
    state.matchOver     = prev.matchOver;
    renderScore();
    showToast('Point annulé');
  }

  // ── RENDU ────────────────────────────────────────────────────────

  // Met à jour tout l'affichage du score (sets, jeux, badge deuce/STB)
  function renderScore() {
    const setsRow = document.getElementById('sets-row');
    const labels  = SCORE_LABELS[state.scoreMode];
    const pts     = state.points;

    let ptLabels;
    if (state.superTieBreak) {
      // Super Tie Break : on affiche les points directement (0, 1, 2… 10)
      ptLabels = [String(pts[0]), String(pts[1])];
    } else {
      // Calcule les labels de points pour le jeu en cours
      ptLabels = state.deuce
        ? (state.advantage === 0  ? ['Av', '']
         : state.advantage === 1  ? ['', 'Av']
         : ['=', '='])
        : [labels[Math.min(pts[0], labels.length - 1)],
           labels[Math.min(pts[1], labels.length - 1)]];
    }

    // Génère le HTML des sets terminés
    let setsHTML = state.sets.map((s, i) =>
      `<div class="set-box">
        <div class="set-label">Set ${i + 1}</div>
        <div class="set-scores">
          <span>${s.p1}</span>
          <span style="font-size:12px;opacity:0.4">-</span>
          <span>${s.p2}</span>
        </div>
      </div>`
    ).join('');

    // Case du jeu en cours (ou STB en cours)
    const currentLabel = state.superTieBreak ? 'STB' : 'Jeu';
    setsHTML += `<div class="set-box current">
      <div class="set-label">${currentLabel}</div>
      <div class="set-scores" style="font-size:14px">
        <span>${ptLabels[0]}</span>
        <span style="font-size:11px;opacity:0.4">-</span>
        <span>${ptLabels[1]}</span>
      </div>
    </div>`;

    setsRow.innerHTML = setsHTML;

    // Met à jour les gros chiffres (jeux) — affiche les points STB si en STB
    if (state.superTieBreak) {
      document.getElementById('gs-p1').textContent  = pts[0];
      document.getElementById('gs-p2').textContent  = pts[1];
      document.getElementById('gsl-p1').textContent = 'pts STB';
      document.getElementById('gsl-p2').textContent = 'pts STB';
    } else {
      document.getElementById('gs-p1').textContent  = state.games[0];
      document.getElementById('gs-p2').textContent  = state.games[1];
      document.getElementById('gsl-p1').textContent = 'jeux';
      document.getElementById('gsl-p2').textContent = 'jeux';
    }

    // Badge : Super Tie Break, deuce ou avantage
    const badge = document.getElementById('status-badge');
    if (state.superTieBreak) {
      badge.style.display = 'block';
      badge.textContent = '🔥 Super Tie Break — premier à 10 pts (écart de 2)';
    } else if (state.deuce) {
      badge.style.display = 'block';
      if      (state.advantage === 0)  badge.textContent = '⚡ Avantage ' + state.p1;
      else if (state.advantage === 1)  badge.textContent = '⚡ Avantage ' + state.p2;
      else                             badge.textContent = '🔥 Égalité (Deuce)';
    } else {
      badge.style.display = 'none';
    }
  }

  // Active la page demandée et met à jour la nav
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach((b, i) => {
      b.classList.toggle('active', ['match', 'stats', 'history'][i] === name);
    });
    document.getElementById('page-' + name).classList.add('active');
    if (name === 'stats')   renderStats();
    if (name === 'history') renderHistory();
  }

  // ── PAGE STATS ───────────────────────────────────────────────────

  // Construit le classement des joueurs à partir de l'historique
  function renderStats() {
    const history   = getStoredHistory();
    const container = document.getElementById('stats-content');

    if (history.length === 0) {
      container.innerHTML = `<div class="stats-empty"><div class="emoji">🎾</div><p>Aucun match enregistré.</p><p style="margin-top:8px;font-size:13px">Jouez votre premier match !</p></div>`;
      return;
    }

    // Agrège les statistiques par joueur
    const players = {};
    history.forEach(m => {
      [m.p1, m.p2].forEach((name, idx) => {
        if (!players[name]) players[name] = { name, matches: 0, wins: 0, totalSets: 0, setsWon: 0, recentMatches: [] };
        players[name].matches++;
        const isWinner = m.winner === name;
        if (isWinner) players[name].wins++;
        const sets = idx === 0 ? m.setsP1 : m.setsP2;
        players[name].setsWon   += sets;
        players[name].totalSets += m.setsP1 + m.setsP2;
        players[name].recentMatches.unshift({ opponent: idx === 0 ? m.p2 : m.p1, win: isWinner, score: m.scoreStr, date: m.date });
      });
    });

    // Trie par victoires puis par nombre de matchs
    const sorted = Object.values(players).sort((a, b) => b.wins - a.wins || b.matches - a.matches);

    let html = `<div class="section-label">Classement des joueurs</div>`;
    sorted.forEach((p, idx) => {
      const wr     = p.matches   > 0 ? Math.round((p.wins     / p.matches)   * 100) : 0; // % victoires
      const swr    = p.totalSets > 0 ? Math.round((p.setsWon  / p.totalSets) * 100) : 0; // % sets
      const avatarClass = idx % 2 === 1 ? ' p2' : ''; // alternance couleur avatar
      const initials    = p.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const recent      = p.recentMatches.slice(0, 3);

      html += `<div class="player-stat-card">
        <div class="psc-header">
          <div class="psc-avatar${avatarClass}">${initials}</div>
          <div>
            <div class="psc-name">${p.name}</div>
            <div class="psc-record">${p.wins}V – ${p.matches - p.wins}D</div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-pill"><div class="val">${p.matches}</div><div class="lbl">Matchs</div></div>
          <div class="stat-pill"><div class="val">${p.wins}</div><div class="lbl">Victoires</div></div>
          <div class="stat-pill"><div class="val">${wr}%</div><div class="lbl">Win Rate</div></div>
          <div class="stat-pill"><div class="val">${p.setsWon}</div><div class="lbl">Sets gagnés</div></div>
          <div class="stat-pill"><div class="val">${p.totalSets}</div><div class="lbl">Sets joués</div></div>
          <div class="stat-pill"><div class="val">${swr}%</div><div class="lbl">% Sets</div></div>
        </div>
        <div class="win-bar-wrap">
          <div class="win-bar-label"><span>Win rate</span><span>${wr}%</span></div>
          <div class="win-bar"><div class="win-bar-fill" style="width:${wr}%"></div></div>
        </div>
        ${recent.length > 0 ? `<div style="margin-top:12px">` + recent.map(r =>
          `<div class="match-history-item">
            <div class="mhi-result ${r.win ? 'win' : 'loss'}">${r.win ? 'V' : 'D'}</div>
            <div class="mhi-info"><div class="mhi-vs">vs ${r.opponent}</div><div class="mhi-score">${r.score}</div></div>
            <div class="mhi-date">${r.date}</div>
          </div>`
        ).join('') + `</div>` : ''}
      </div>`;
    });

    container.innerHTML = html;
  }

  // ── PAGE HISTORIQUE ──────────────────────────────────────────────

  // Affiche la liste des matchs joués
  function renderHistory() {
    const history   = getStoredHistory();
    const container = document.getElementById('history-content');

    if (history.length === 0) {
      container.innerHTML = `<div class="stats-empty"><div class="emoji">📋</div><p>Aucun match dans l'historique.</p></div>`;
      return;
    }

    let html = `<div class="section-label">${history.length} match${history.length > 1 ? 's' : ''} enregistré${history.length > 1 ? 's' : ''}</div>`;
    html += history.map(m => `
      <div class="history-match-card">
        <div class="hmc-top">
          <div class="hmc-names">${m.p1} <span style="color:var(--gray-light);font-weight:400">vs</span> ${m.p2}</div>
          <div class="hmc-date">${m.date}</div>
        </div>
        <div class="hmc-score">Sets : ${m.setsP1} – ${m.setsP2} (${m.scoreStr})</div>
        <div class="hmc-winner">🏆 ${m.winner}</div>
      </div>
    `).join('');

    html += `<button class="ctrl-btn danger" style="width:100%;margin-top:10px" onclick="clearHistory()">🗑 Effacer l'historique</button>`;
    container.innerHTML = html;
  }

  // Efface tout l'historique après confirmation
  function clearHistory() {
    if (confirm('Effacer tout l\'historique ?')) {
      localStorage.removeItem('bt_history');
      renderHistory();
    }
  }

  // ── UTILITAIRES ──────────────────────────────────────────────────

  // Affiche un toast de notification pendant 2 secondes
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── INITIALISATION ───────────────────────────────────────────────
  renderScore();

</script>
</body>
</html>
