<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de Stats</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 500px; }
        .input-group { margin-bottom: 20px; }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
        .button-section { margin-bottom: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; background-color: #007BFF; color: white; margin-right: 5px; margin-bottom: 5px; }
        button:hover { background-color: #0056b3; }
        .btn-stats { background-color: #28a745; }
        .btn-stats:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Configuration</h2>
        
        <!-- Champs pour les 4 prénoms -->
        <div class="input-group">
            <input type="text" placeholder="Prénom 1">
            <input type="text" placeholder="Prénom 2">
            <input type="text" placeholder="Prénom 3">
            <input type="text" placeholder="Prénom 4">
        </div>

        <!-- Groupe de boutons de statistiques -->
        <div class="button-section">
            <button type="button" class="btn-stats">Comptage de points</button>
            <button type="button" class="btn-stats">Stats de base</button>
            <button type="button" class="btn-stats">Stats avancées</button>
        </div>
    </div>

</body>
</html>
