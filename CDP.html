<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Tennis – Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080f1e;
  --surface:#0d1829;
  --card:#111e35;
  --border:#1e3560;
  --gold:#f5c518;
  --blue:#3b82f6;
  --orange:#f97316;
  --green:#22c55e;
  --red:#ef4444;
  --text:#e2eaf8;
  --muted:#4a6494;
}

body{
  font-family:Barlow,sans-serif;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 1rem 4rem;
}

/* ── HEADER ── */
.header{
  width:100%;
  max-width:580px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.2rem 0 1rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.4rem;
}
.header-logo{
  font-family:Barlow Condensed,sans-serif;
  font-size:22px;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold);
}
.header-logo span{color:var(--text);opacity:.5}
.header-back{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  font-family:Barlow Condensed,sans-serif;
  font-size:12px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:6px 14px;
  border-radius:8px;
  cursor:pointer;
  transition:all .18s;
}
.header-back:hover{border-color:var(--gold);color:var(--gold)}

/* ── STATUS BAR ── */
.status-bar{
  width:100%;
  max-width:580px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:.85rem 1.4rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:1.2rem;
}
.status-pill{
  font-family:Barlow Condensed,sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--bg);
  background:var(--gold);
  padding:4px 14px;
  border-radius:20px;
}
.status-label{
  font-family:Barlow Condensed,sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--muted);
}

/* ── SCOREBOARD CARD ── */
.scoreboard{
  width:100%;
  max-width:580px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 48px rgba(0,0,0,.5);
  margin-bottom:1.2rem;
}

.score-header{
  display:grid;
  grid-template-columns:1fr 44px 44px 44px 80px;
  gap:0;
  padding:.6rem 1.4rem;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.score-header span{
  font-family:Barlow Condensed,sans-serif;
  font-size:11px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  text-align:center;
}
.score-header span:first-child{text-align:left}

.team-row{
  display:grid;
  grid-template-columns:1fr 44px 44px 44px 80px;
  align-items:center;
  padding:1.1rem 1.4rem;
  border-bottom:1px solid var(--border);
}
.team-row:last-child{border-bottom:none}

.team-info{display:flex;flex-direction:column;gap:3px;}
.team-name{font-family:Barlow Condensed,sans-serif;font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase;}
.team-players{font-size:11px;color:var(--muted);font-weight:500;}

.cell{text-align:center;font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:900;}
.cell.point-cell{font-size:36px;color:var(--gold);font-style:italic;}
.cell.set-score{font-family:Barlow Condensed,sans-serif;font-size:18px;font-weight:900;text-align:center;color:var(--muted);}
.cell.set-score.active{color:var(--text)}
.cell.set-score.won{color:var(--gold)}

.team-row.team-a .team-name{color:var(--blue)}
.team-row.team-b .team-name{color:var(--orange)}

/* ── CONTROLS ── */
.controls{width:100%;max-width:580px;display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.2rem;}
.btn-point{
  padding:1.1rem;border-radius:14px;border:2px solid;
  font-family:Barlow Condensed,sans-serif;font-size:17px;font-weight:900;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.btn-point.a{background:rgba(59,130,246,.12);border-color:var(--blue);color:var(--blue);}
.btn-point.b{background:rgba(249,115,22,.12);border-color:var(--orange);color:var(--orange);}

.actions{width:100%;max-width:580px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.2rem;}
.btn-action{
  padding:.75rem;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-family:Barlow Condensed,sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
}
.btn-action.reset{border-color:var(--red);color:var(--red)}

/* ── TIMER ── */
.timer-wrap{
  width:100%;max-width:580px;background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:.9rem 1.4rem;margin-bottom:1rem;
  display:flex;align-items:center;justify-content:space-between;
}
.timer-display{font-family:Barlow Condensed,sans-serif;font-size:38px;font-weight:900;color:var(--gold);min-width:110px;}

/* ── LOG & OVERLAY ── */
.log-wrap{width:100%;max-width:580px;}
.log-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;}
.log-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem 1rem;font-size:12px;color:var(--muted);}

.winner-overlay{
  display:none;position:fixed;inset:0;background:rgba(8,15,30,.92);
  z-index:100;align-items:center;justify-content:center;flex-direction:column;padding:2rem;
}
.winner-overlay.show{display:flex}
.winner-box{background:var(--card);border:2px solid var(--gold);border-radius:24px;padding:2.5rem 2rem;text-align:center;max-width:380px;width:100%;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Beach<span>/</span>Stats</div>
  <button class="header-back" onclick="window.location.href='index.html'">← Accueil</button>
</div>

<div class="status-bar">
  <div class="status-pill" id="setPill">Set 1</div>
  <div class="status-label" id="statusLabel">En cours</div>
</div>

<div class="timer-wrap">
  <div class="timer-display" id="timerDisplay">00:00</div>
  <button class="btn-action" id="timerStartBtn" onclick="timerToggle()">▶ Start</button>
</div>

<div class="scoreboard">
  <div class="score-header">
    <span>Équipe</span>
    <span>S1</span>
    <span>S2</span>
    <span>S3</span>
    <span>Points</span>
  </div>
  <div class="team-row team-a" id="rowA">
    <div class="team-info">
      <div class="team-name" id="nameA">Équipe A</div>
      <div class="team-players" id="playersA">—</div>
    </div>
    <div class="cell set-score" id="setA1">—</div>
    <div class="cell set-score" id="setA2">—</div>
    <div class="cell set-score" id="setA3">—</div>
    <div class="cell point-cell" id="ptA">0</div>
  </div>
  <div class="team-row team-b" id="rowB">
    <div class="team-info">
      <div class="team-name" id="nameB">Équipe B</div>
      <div class="team-players" id="playersB">—</div>
    </div>
    <div class="cell set-score" id="setB1">—</div>
    <div class="cell set-score" id="setB2">—</div>
    <div class="cell set-score" id="setB3">—</div>
    <div class="cell point-cell" id="ptB">0</div>
  </div>
</div>

<div class="controls">
  <button class="btn-point a" onclick="scorePoint(1)">
    <small>Point pour</small>
    <span id="btnA">Équipe A</span>
  </button>
  <button class="btn-point b" onclick="scorePoint(2)">
    <small>Point pour</small>
    <span id="btnB">Équipe B</span>
  </button>
</div>

<div class="actions">
  <button class="btn-action" onclick="undo()">↩ Annuler</button>
  <button class="btn-action" onclick="exportPDF()">⬇ Export PDF</button>
  <button class="btn-action reset" onclick="resetMatch()">⟳ Reset</button>
</div>

<div class="log-wrap">
  <div class="log-list" id="logList"></div>
</div>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-box">
    <div class="winner-label">Vainqueur</div>
    <div class="winner-name" id="winnerName">—</div>
    <div class="winner-score" id="winnerScore">—</div>
    <br>
    <button class="btn-action reset" onclick="resetMatch()">Nouveau match</button>
  </div>
</div>

<script>
let p1=0, p2=0, g1=0, g2=0, s1=0, s2=0;
let setHistory=[]; 
let inTiebreak=false, inSuperTiebreak=false;
let history=[];
let matchLog=[];
let matchOver=false;
const TP=["0","15","30","40"];

const _p=new URLSearchParams(window.location.search);
let players={
  j1:_p.get('j1')||'Joueur 1', j2:_p.get('j2')||'Joueur 2',
  j3:_p.get('j3')||'Joueur 3', j4:_p.get('j4')||'Joueur 4'
};
const nameA = players.j1 + " / " + players.j2;
const nameB = players.j3 + " / " + players.j4;

function initNames(){
  document.getElementById('playersA').textContent = nameA;
  document.getElementById('playersB').textContent = nameB;
  document.getElementById('btnA').textContent = players.j1.split(' ')[0] + " & " + players.j2.split(' ')[0];
  document.getElementById('btnB').textContent = players.j3.split(' ')[0] + " & " + players.j4.split(' ')[0];
}

function saveState(){
  history.push(JSON.parse(JSON.stringify({p1,p2,g1,g2,s1,s2,inTiebreak,inSuperTiebreak,setHistory})));
}

function scorePoint(player){
  if(matchOver) return;
  saveState();

  // Logique Super Tie-Break (3ème set)
  if(inSuperTiebreak){
    if(player===1) p1++; else p2++;
    if((p1>=10||p2>=10) && Math.abs(p1-p2)>=2){
      winMatch(player);
    }
    updateDisplay(); return;
  }

  // Logique Tie-Break classique (6-6)
  if(inTiebreak){
    if(player===1) p1++; else p2++;
    if((p1>=7||p2>=7) && Math.abs(p1-p2)>=2){
      winGame(player);
    }
    updateDisplay(); return;
  }

  // Jeu Normal (No-Ad)
  if(player===1) p1++; else p2++;
  if(p1>3 || p2>3){
    winGame(player);
    return;
  }
  updateDisplay();
}

function winGame(player){
  const wasTiebreak = inTiebreak;
  p1=0; p2=0; inTiebreak=false;
  if(player===1) g1++; else g2++;
  
  if(wasTiebreak) { winSet(player); return; }

  const maxG=Math.max(g1,g2), minG=Math.min(g1,g2);
  if(maxG>=6 && maxG-minG>=2){ winSet(player); return; }
  
  if(g1===6 && g2===6){
    inTiebreak=true;
    document.getElementById('setPill').textContent="Tie-Break";
    document.getElementById('statusLabel').textContent="7 pts / 2 d'écart";
  }
  updateDisplay();
}

function winSet(player){
  setHistory.push({a:g1,b:g2});
  p1=0; p2=0; g1=0; g2=0;
  if(player===1) s1++; else s2++;

  if(s1===2 || s2===2){ winMatch(player); return; }

  // Déclenchement Super Tie-Break si 1-1
  if(s1===1 && s2===1){
    inSuperTiebreak = true;
    document.getElementById('setPill').textContent="Set 3";
    document.getElementById('statusLabel').textContent="Super Tie-Break (10 pts)";
  } else {
    document.getElementById('setPill').textContent="Set "+(s1+s2+1);
    document.getElementById('statusLabel').textContent="En cours";
  }
  updateDisplay();
}

function winMatch(player){
  matchOver=true;
  if(timerRunning) timerToggle();
  const winner = player===1 ? nameA : nameB;
  document.getElementById('winnerName').textContent = winner;
  document.getElementById('winnerScore').textContent = `Score: ${s1}-${s2}`;
  document.getElementById('winnerOverlay').classList.add('show');
}

function undo(){
  if(history.length===0) return;
  const last=history.pop();
  p1=last.p1; p2=last.p2; g1=last.g1; g2=last.g2; s1=last.s1; s2=last.s2;
  inTiebreak=last.inTiebreak; inSuperTiebreak=last.inSuperTiebreak;
  setHistory=last.setHistory;
  matchOver=false;
  document.getElementById('winnerOverlay').classList.remove('show');
  updateDisplay();
}

function resetMatch(){
  if(!confirm("Tout remettre à zéro ?")) return;
  p1=0; p2=0; g1=0; g2=0; s1=0; s2=0;
  setHistory=[]; history=[]; matchOver=false;
  inTiebreak=false; inSuperTiebreak=false;
  timerReset();
  document.getElementById('winnerOverlay').classList.remove('show');
  document.getElementById('setPill').textContent="Set 1";
  document.getElementById('statusLabel').textContent="En cours";
  updateDisplay();
}

function updateDisplay(){
  let ptA, ptB;
  if(inTiebreak || inSuperTiebreak){
    ptA = p1; ptB = p2;
  } else {
    ptA = (p1===3 && p2===3) ? "AD" : TP[p1];
    ptB = (p1===3 && p2===3) ? "AD" : TP[p2];
  }
  document.getElementById('ptA').textContent = ptA;
  document.getElementById('ptB').textContent = ptB;

  for(let i=1; i<=3; i++){
    const cellA = document.getElementById('setA'+i);
    const cellB = document.getElementById('setB'+i);
    if(i-1 < setHistory.length){
      cellA.textContent = setHistory[i-1].a;
      cellB.textContent = setHistory[i-1].b;
      cellA.className = 'cell set-score ' + (setHistory[i-1].a > setHistory[i-1].b ? 'won' : '');
      cellB.className = 'cell set-score ' + (setHistory[i-1].b > setHistory[i-1].a ? 'won' : '');
    } else if(i-1 === setHistory.length && !matchOver){
      cellA.textContent = g1; cellB.textContent = g2;
      cellA.className = 'cell set-score active'; cellB.className = 'cell set-score active';
    } else {
      cellA.textContent = '—'; cellB.textContent = '—';
      cellA.className = 'cell set-score'; cellB.className = 'cell set-score';
    }
  }
}

let timerSeconds = 0, timerInterval = null, timerRunning = false;
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval); timerRunning=false;
    document.getElementById('timerStartBtn').textContent='▶ Start';
  } else {
    timerRunning=true;
    document.getElementById('timerStartBtn').textContent='⏸ Pause';
    timerInterval = setInterval(()=>{
      timerSeconds++;
      let m=String(Math.floor(timerSeconds/60)).padStart(2,'0');
      let s=String(timerSeconds%60).padStart(2,'0');
      document.getElementById('timerDisplay').textContent=m+':'+s;
    },1000);
  }
}
function timerReset(){ clearInterval(timerInterval); timerSeconds=0; timerRunning=false; document.getElementById('timerDisplay').textContent='00:00'; document.getElementById('timerStartBtn').textContent='▶ Start'; }

initNames();
updateDisplay();
</script>
</body>
</html>
